<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Recipe Ripper</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recipe Ripper">
  <meta name="theme-color" content="#D4705A">
  <script>
  // Generate app icon — bold "K" on terracotta
  (function(){
    try{
      const c=document.createElement('canvas');
      c.width=512;c.height=512;
      const ctx=c.getContext('2d');
      const W=512,H=512;
      ctx.fillStyle='#D4705A';
      ctx.beginPath();ctx.roundRect(0,0,W,H,112);ctx.fill();
      // Mirror the SVG topbar logo exactly (viewBox 0 0 30 30, font-size 17)
      // Scale factor: 512/30 = 17.07
      const scale=W/30;
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
      ctx.font=`800 ${Math.round(17*scale)}px -apple-system,"Helvetica Neue",Arial,sans-serif`;
      // Back R: SVG x=6 y=17, opacity 0.5
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillText('R',6*scale,17*scale);
      // Front R: SVG x=12 y=24, opacity 1
      ctx.fillStyle='#ffffff';
      ctx.fillText('R',12*scale,24*scale);
      const link=document.createElement('link');
      link.rel='apple-touch-icon';link.href=c.toDataURL('image/png');
      document.head.appendChild(link);
      const fav=document.createElement('link');
      fav.rel='icon';fav.type='image/png';fav.href=c.toDataURL('image/png');
      document.head.appendChild(fav);
    }catch(e){}
  })();
  </script>
  <meta name="mobile-web-app-capable" content="yes">
  <script>
  (function(){
    try{
      const canvas=document.querySelector('canvas')||document.createElement('canvas');
      const iconHref=document.querySelector('link[rel="apple-touch-icon"]')?.href||'';
      const manifest={
        name:'Recipe Ripper',short_name:'Recipes',
        start_url:'.',display:'standalone',
        background_color:'#FFFFFF',theme_color:'#D4705A',
        icons:iconHref?[{src:iconHref,sizes:'512x512',type:'image/png'}]:[]
      };
      const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const link=document.createElement('link');
      link.rel='manifest';link.href=url;
      document.head.appendChild(link);
    }catch(e){}
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --terra:    #D4705A;
      --terra-dk: #B85A46;
      --terra-bg: #FDF1EE;
      --terra-lt: #F5C5BB;
      --bg:       #FFFFFF;
      --bg-2:     #F8F6F4;
      --border:   #EEE9E6;
      --text:     #1A1514;
      --text-2:   #6B6260;
      --text-3:   #B0A8A4;
      --success:  #2A9D5C;
      --danger:   #D64045;
      --nav-h:    64px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    a,button,input,select,textarea,[role="button"]{touch-action:manipulation;}
    html,body{
      height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    /* ── BOTTOM NAV ── */
    .bnav{
      position:fixed;bottom:0;left:0;right:0;z-index:300;
      height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
      padding-bottom:env(safe-area-inset-bottom,0px);
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      display:flex;
    }
    .bnav-tab{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;border:none;background:none;cursor:pointer;
      font-family:inherit;color:var(--text-3);transition:color .18s;
      -webkit-tap-highlight-color:transparent;
    }
    .bnav-tab.active{color:var(--terra);}
    .bnav-tab svg{width:22px;height:22px;}
    .bnav-tab span{font-size:.65rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
    /* ── SHELL ── */
    .shell{min-height:100dvh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));}
    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:200;
      padding:max(16px,env(safe-area-inset-top)) 18px 12px;
      background:rgba(255,255,255,.93);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    }
    .topbar-row{display:flex;align-items:center;justify-content:space-between;}
    .topbar-brand{display:flex;align-items:center;gap:9px;}
    .topbar-logo{
      width:30px;height:30px;border-radius:8px;
      background:var(--terra);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;overflow:hidden;
    }
    .topbar-logo svg{width:30px;height:30px;}
    .topbar-wordmark{font-size:1.1rem;font-weight:800;letter-spacing:-.3px;color:var(--text-1);}
    .topbar-add{
      width:34px;height:34px;border-radius:50%;border:none;
      background:var(--terra);color:#fff;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;transition:background .15s;flex-shrink:0;
    }
    .topbar-add:hover{background:var(--terra-dk);}
    .topbar-add svg{width:18px;height:18px;}
    /* ── SEARCH WRAP ── */
    .search-wrap{position:relative;}
    .search-box{
      width:100%;height:40px;border-radius:10px;
      font-size:16px;
      direction:ltr;unicode-bidi:plaintext;
    }
    /* Force LTR on all text inputs regardless of locale */
    input,textarea,select{direction:ltr;unicode-bidi:plaintext;}
    /* ── ICON BUTTON ── */
    .ibtn{
      width:40px;height:40px;border-radius:50%;border:none;background:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:var(--text-2);-webkit-tap-highlight-color:transparent;transition:background .15s;
    }
    .ibtn:hover{background:var(--bg-2);}
    .ibtn svg{width:20px;height:20px;}
    /* ── BUTTONS ── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      height:50px;border-radius:12px;padding:0 20px;
      font-family:inherit;font-size:.9rem;font-weight:700;border:none;cursor:pointer;
      -webkit-tap-highlight-color:transparent;transition:opacity .15s,transform .1s;
    }
    .btn:active{transform:scale(.97);}
    .btn svg{width:18px;height:18px;}
    .btn-terra{background:var(--terra);color:#fff;}
    .btn-terra:hover{background:var(--terra-dk);}
    .btn-outline{background:none;color:var(--terra);border:1.5px solid var(--terra);}
    .btn-outline:hover{background:var(--terra-bg);}
    .btn-ghost{background:none;color:var(--text-2);border:1.5px solid var(--border);}
    .btn-ghost:hover{background:var(--bg-2);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-danger:hover{background:#b83438;}
    .btn-full{width:100%;}
    .btn-lg{height:54px;font-size:.95rem;border-radius:14px;}
    /* ── RECIPE CARDS ── */
    .card-list{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px;}
    .recipe-card{
      background:var(--bg);border-radius:14px;overflow:hidden;
      border:1.5px solid var(--border);
      display:flex;flex-direction:row;align-items:stretch;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:transform .15s;
    }
    .recipe-card:active{transform:scale(.985);}
    .rc-img{
      width:88px;min-height:88px;flex-shrink:0;
      object-fit:cover;display:block;background:var(--terra-bg);
    }
    .rc-img-ph{
      width:88px;min-height:88px;flex-shrink:0;
      background:linear-gradient(135deg,#F5EDE8,#EBD8D1);
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:800;color:rgba(212,112,90,.35);
    }
    .rc-body{
      padding:12px 14px;flex:1;min-width:0;
      display:flex;flex-direction:column;justify-content:center;gap:4px;
    }
    .rc-name{font-size:1rem;font-weight:700;letter-spacing:-.2px;line-height:1.3;margin:0;}
    .rc-meta{display:flex;align-items:center;gap:5px;color:var(--text-3);font-size:.8rem;margin:0;}
    .rc-meta svg{width:12px;height:12px;flex-shrink:0;}
    .rc-chip{
      display:inline-block;margin-top:2px;align-self:flex-start;
      background:var(--terra-bg);color:var(--terra);
      font-size:.72rem;font-weight:700;letter-spacing:.2px;
      padding:2px 8px;border-radius:99px;
    }
    /* ── DETAIL ── */
    .detail-img{width:100%;height:240px;object-fit:cover;display:block;background:var(--terra-bg);}
    .detail-img-ph{
      width:100%;height:240px;
      background:linear-gradient(135deg,#F5EDE8,#EBD8D1);
      display:flex;align-items:center;justify-content:center;
      font-size:6rem;font-weight:800;color:rgba(212,112,90,.15);
    }
    .detail-hdr{padding:16px 18px 0;}
    .detail-name{font-size:1.45rem;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;}
    .detail-meta{display:flex;align-items:center;gap:6px;color:var(--text-3);font-size:.84rem;}
    .detail-meta svg{width:14px;height:14px;flex-shrink:0;}
    /* sub-tabs */
    .sub-tabs{display:flex;gap:0;padding:0 18px;border-bottom:1px solid var(--border);margin-top:14px;}
    .sub-tab{
      padding:10px 0 11px;margin-right:24px;
      border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;
      background:none;font-family:inherit;font-size:.88rem;font-weight:600;
      color:var(--text-3);cursor:pointer;transition:color .18s,border-color .18s;
    }
    .sub-tab.active{color:var(--terra);border-bottom-color:var(--terra);}
    /* ingredients */
    .tab-content{padding:4px 18px 4px;}
    .ingr-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:11px 0;border-bottom:1px solid var(--border);
    }
    .ingr-row:last-child{border-bottom:none;}
    .ingr-name{font-size:.9rem;color:var(--text-2);flex:1;}
    .ingr-qty{display:none;}
    /* cookware */
    .cw-item{
      display:flex;align-items:center;gap:12px;
      padding:11px 0;border-bottom:1px solid var(--border);
      font-size:.9rem;color:var(--text-2);
    }
    .cw-item:last-child{border-bottom:none;}
    .cw-dot{width:6px;height:6px;border-radius:50%;background:var(--terra);flex-shrink:0;}
    /* steps overview */
    .sov-row{
      display:flex;gap:12px;align-items:flex-start;
      padding:11px 0;border-bottom:1px solid var(--border);
    }
    .sov-row:last-child{border-bottom:none;}
    .sov-num{
      width:26px;height:26px;border-radius:50%;
      background:var(--bg-2);color:var(--text-3);
      font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .sov-title{font-size:.88rem;font-weight:600;margin-bottom:2px;}
    .sov-timer{font-size:.76rem;color:var(--text-3);}
    /* full recipe view */
    .full-phase-hdr{
      display:flex;align-items:center;gap:8px;
      padding:18px 0 6px;font-size:.72rem;font-weight:700;
      text-transform:uppercase;letter-spacing:.6px;
    }
    .full-phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .full-step{
      padding:14px 0;border-bottom:1px solid var(--border);
    }
    .full-step:last-child{border-bottom:none;}
    .full-step-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;}
    .full-step-num{
      width:24px;height:24px;border-radius:50%;flex-shrink:0;
      font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;
      background:var(--bg-2);color:var(--text-3);
    }
    .full-step-title{font-size:.92rem;font-weight:700;line-height:1.3;flex:1;}
    .full-step-body{font-size:.88rem;line-height:1.7;color:var(--text-2);padding-left:34px;}
    .full-step-timer{font-size:.76rem;color:var(--terra);font-weight:600;padding-left:34px;margin-top:4px;}
    .full-ingr-sec{padding:10px 0 2px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);}
    .full-ingr-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.9rem;}
    .full-ingr-row:last-child{border-bottom:none;}
    /* ── SCALING BAR ── */
    .scale-bar{display:flex;gap:6px;padding:12px 18px 4px;align-items:center;}
    .scale-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-right:6px;}
    .scale-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:none;font-size:.8rem;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;}
    .scale-btn.active{background:var(--terra);border-color:var(--terra);color:#fff;}
    /* ── SUBSTITUTION ── */
    .sub-btn{border:none;background:none;cursor:pointer;color:var(--text-3);font-size:.7rem;font-weight:600;padding:0 0 0 8px;flex-shrink:0;opacity:.6;transition:opacity .15s;}
    .sub-btn:hover,.sub-btn:active{opacity:1;color:var(--terra);}
    .sub-card{background:var(--terra-bg);border-radius:10px;padding:10px 13px;margin:4px 0 8px;font-size:.82rem;line-height:1.6;color:#7C3015;border-left:3px solid var(--terra);}
    .sub-card-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--terra);margin-bottom:3px;}
    /* ── EXPORT MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;}
    .modal-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:80dvh;display:flex;flex-direction:column;padding-bottom:max(24px,env(safe-area-inset-bottom));}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0;}
    .modal-title{font-size:1rem;font-weight:700;padding:14px 20px 10px;border-bottom:1px solid var(--border);}
    .modal-body{overflow-y:auto;padding:16px 20px;flex:1;-webkit-overflow-scrolling:touch;}
    .modal-actions{display:flex;gap:10px;padding:12px 20px 0;flex-shrink:0;}
    .export-text{font-family:monospace;font-size:.78rem;line-height:1.7;white-space:pre-wrap;background:var(--bg-2);border-radius:10px;padding:12px;color:var(--text-2);}
    /* ── AI GENERATOR ── */
    .ai-gen-wrap{padding:16px 18px;}
    /* ── LAST COOKED BADGE ── */
    .last-cooked-badge{font-size:.72rem;color:var(--text-3);margin-top:4px;}
    /* ── PRINT ── */
    @media print{
      .shell>:not(.print-zone),.bnav,.topbar,.detail-cta,.sub-tabs,.scale-bar{display:none!important;}
      .print-zone{display:block!important;}
      body{background:#fff;font-family:Georgia,serif;}
    }
    .print-zone{display:none;}

    /* CTA row */
    .detail-cta{padding:12px 18px 16px;display:flex;flex-direction:column;gap:10px;}
    /* ── GUIDED ── */
    .guided-shell{background:#fff;min-height:100dvh;}
    .guided-top{
      padding:max(16px,env(safe-area-inset-top)) 16px 12px;
      display:flex;align-items:center;position:relative;
    }
    .guided-label{
      position:absolute;left:0;right:0;text-align:center;
      font-size:.76rem;font-weight:700;letter-spacing:1.2px;
      text-transform:uppercase;color:var(--text-2);pointer-events:none;
    }
    .guided-prog{height:2px;background:var(--border);margin:0 18px;}
    .guided-prog-fill{height:100%;background:var(--terra);transition:width .35s ease;border-radius:99px;}
    .guided-body{padding:24px 20px;padding-bottom:100px;}
    .guided-phase{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;
    }
    .guided-phase-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .guided-title{font-size:1.4rem;font-weight:800;line-height:1.25;letter-spacing:-.4px;margin-bottom:14px;}
    .guided-instructions{font-size:1.15rem;line-height:1.8;color:var(--text);}
    .guided-tip{
      margin-top:14px;padding:12px 14px;
      background:var(--terra-bg);border-radius:10px;
      font-size:.84rem;color:#7C3015;line-height:1.6;
    }
    .guided-tip-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--terra);margin-bottom:3px;}
    .step-img{
      width:calc(100% + 36px);margin-left:-18px;
      height:220px;object-fit:cover;display:block;margin-top:20px;
    }
    /* timer in step */
    .step-timer-wrap{margin:24px 0 8px;display:flex;flex-direction:column;align-items:center;gap:14px;}
    .t-ring-wrap{position:relative;width:160px;height:160px;}
    .t-ring-wrap svg{width:100%;height:100%;}
    .t-overlay{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .t-time{font-size:2rem;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1;}
    .t-time.done{color:var(--success);}
    .t-sub{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-top:2px;}
    .t-label{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);}
    .t-btns{display:flex;gap:10px;}
    /* ingredients quick-view sheet */
    .ingr-sheet-overlay{
      position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.38);
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .ingr-sheet-overlay.open{opacity:1;pointer-events:all;}
    .ingr-sheet{
      position:fixed;left:0;right:0;bottom:0;z-index:401;
      background:#fff;border-radius:22px 22px 0 0;
      max-height:72dvh;display:flex;flex-direction:column;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
      padding-bottom:max(20px,env(safe-area-inset-bottom));
    }
    .ingr-sheet.open{transform:translateY(0);}
    .ingr-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0;}
    .ingr-sheet-title{font-size:.92rem;font-weight:700;padding:14px 20px 6px;border-bottom:1px solid var(--border);}
    .ingr-sheet-body{overflow-y:auto;padding:4px 20px 12px;-webkit-overflow-scrolling:touch;}
    .ingr-sheet-sec{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);padding:12px 0 4px;}
    .ingr-sheet-row{display:flex;padding:9px 0;border-bottom:1px solid var(--border);font-size:.9rem;color:var(--text-2);}
    .ingr-sheet-row:last-child{border-bottom:none;}
    /* round floating nav */
    .guided-footer{
      position:fixed;bottom:0;left:0;right:0;
      padding:12px 20px;
      padding-bottom:max(18px,calc(env(safe-area-inset-bottom,0px) + 12px));
      display:flex;align-items:center;justify-content:flex-end;gap:10px;
      pointer-events:none;
    }
    .guided-footer-left{margin-right:auto;display:flex;gap:8px;}
    .rbtn{
      width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:transform .12s,opacity .15s;
      pointer-events:all;
      box-shadow:0 4px 18px rgba(0,0,0,.18);
    }
    .rbtn:active{transform:scale(.91);}
    .rbtn svg{width:20px;height:20px;}
    .rbtn-terra{background:var(--terra);color:#fff;}
    .rbtn-white{background:#fff;color:var(--text-2);}
    .rbtn:disabled{opacity:.3;cursor:not-allowed;}
    /* ── SHOPPING LIST ── */
    .shop-hdr{
      padding:max(16px,env(safe-area-inset-top)) 18px 0;
    }
    .shop-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .shop-title{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;}
    .shop-subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 18px;}
    .shop-stab{
      padding:10px 0 11px;margin-right:20px;margin-bottom:-1px;
      border:none;border-bottom:2.5px solid transparent;
      background:none;font-family:inherit;font-size:.88rem;font-weight:600;
      color:var(--text-3);cursor:pointer;transition:color .18s,border-color .18s;
    }
    .shop-stab.active{color:var(--terra);border-bottom-color:var(--terra);}
    .shop-body{padding:0 18px;}
    .shop-cat-name{
      font-size:.76rem;font-weight:700;text-transform:lowercase;
      color:var(--terra);margin:20px 0 6px;letter-spacing:.3px;
    }
    .shop-item{
      display:flex;align-items:center;gap:12px;
      padding:9px 0;border-bottom:1px solid var(--border);
    }
    .shop-item:last-child{border-bottom:none;}
    .shop-cb{

// ═══════════════════════════════════════
//  PHASES & COLORS
// ═══════════════════════════════════════
const PHASES={
  'Prep':'#0891B2','Marinating':'#7C3AED','Mixing':'#0369A1',
  'Sautéing':'#B45309','Simmering':'#CA8A04','Roasting':'#B91C1C',
  'Baking':'#DC2626','Grilling':'#9A3412','Frying':'#C2410C',
  'Steaming':'#0284C7','Resting':'#57534E','Assembly':'#15803D',
  'Finishing':'#166534','Cooling':'#0369A1',
  'Levain':'#7C3AED','Autolyse':'#6D28D9',
  'Bulk Fermentation':'#B45309','Shaping':'#854D0E','Proofing':'#4338CA',
};
const PHASE_KEYS=Object.keys(PHASES);
function pc(p){
  if(!p)return'#78716C';
  if(PHASES[p])return PHASES[p];
  // Fuzzy color match for raw section names (keyword-only, never changes the label)
  const nl=p.toLowerCase();
  for(const [k,v] of Object.entries(PHASES)){if(nl.includes(k.toLowerCase())||k.toLowerCase().includes(nl))return v;}
  if(/levain|starter|leaven/i.test(p))return'#7C3AED';
  if(/autolyse|autolyze/i.test(p))return'#6D28D9';
  if(/bulk|ferment/i.test(p))return'#B45309';
  if(/shap/i.test(p))return'#854D0E';
  if(/proof|retard/i.test(p))return'#4338CA';
  if(/bak/i.test(p))return'#DC2626';
  if(/roast/i.test(p))return'#B91C1C';
  if(/grill/i.test(p))return'#9A3412';
  if(/fry/i.test(p))return'#C2410C';
  if(/simmer/i.test(p))return'#CA8A04';
  if(/marinate/i.test(p))return'#7C3AED';
  if(/assembl/i.test(p))return'#15803D';
  if(/finish|garnish/i.test(p))return'#166534';
  if(/cool|rest|stand/i.test(p))return'#57534E';
  if(/mix|combin/i.test(p))return'#0369A1';
  if(/saut[eé]|soften/i.test(p))return'#B45309';
  if(/steam/i.test(p))return'#0284C7';
  if(/prep|mise/i.test(p))return'#0891B2';
  // Deterministic fallback color from name
  const pal=['#0891B2','#7C3AED','#15803D','#B45309','#9A3412','#4338CA','#CA8A04','#0369A1'];
  return pal[p.charCodeAt(0)%pal.length];
}
// Summarize an instruction into a short action title
function summarizeStepTitle(text){
  if(!text)return'';
  text=text.replace(/^step\s*\d+[:\.\-]?\s*/i,'').trim();
  // Find the first imperative cooking verb and build a short phrase around it
  const verbRx=/\b(add|mix|stir|combine|heat|cook|bake|roast|grill|fry|boil|simmer|sauté|saute|pour|place|put|cover|remove|transfer|fold|whisk|knead|chop|dice|slice|mince|preheat|season|serve|cool|refrigerate|drain|rinse|brush|spread|sprinkle|beat|blend|bring|reduce|toss|coat|marinate|brown|sear|fluff|shred|press|roll|shape|proof|rest|dust|divide|flip|stretch|pinch|seal|score|prepare|use|do|make|turn|repeat|continue|let|allow|set aside|deglaze|rest|incorporate|dimple|slap|fold|rise)\b/i;
  const m=text.match(verbRx);
  if(m){
    // Take from the verb forward, trim at a natural break
    let phrase=text.slice(m.index);
    // Cut at "and then", "until it", "so that", secondary clause starters
    phrase=phrase.replace(/\s+(?:and then|once it|until it|so that|which will|you will|this will|it will|at this point)\b.*/i,'');
    // Cut at end of first sentence
    phrase=phrase.split(/[.!?]/)[0];
    // Trim to 60 chars at word boundary
    if(phrase.length>60){phrase=phrase.substring(0,57).replace(/\s+\S*$/,'')+'…';}
    return phrase.trim();
  }
  // Fallback: first clause before comma or semicolon, capped at 60
  let fallback=text.split(/[.!?,;]/)[0].trim();
  if(fallback.length>60)fallback=fallback.substring(0,57).replace(/\s+\S*$/,'')+'…';
  return fallback;
}

const UNICODE_FRACS={'¼':0.25,'½':0.5,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875};
function parseQty(s){
  s=s.trim();
  if(UNICODE_FRACS[s]!==undefined)return UNICODE_FRACS[s];
  if(/^\d+$/.test(s))return parseInt(s);
  if(/^\d+\.\d+$/.test(s))return parseFloat(s);
  if(/^\d+\/\d+$/.test(s)){const[a,b]=s.split('/');return parseInt(a)/parseInt(b);}
  if(/^\d+\s+\d+\/\d+$/.test(s)){const[w,f]=s.split(' ');const[a,b]=f.split('/');return parseInt(w)+parseInt(a)/parseInt(b);}
  return null;
}
function fmtQty(n){
  if(n===0)return'0';
  // Try common fractions
  const fracs=[[1/8,'⅛'],[1/4,'¼'],[1/3,'⅓'],[3/8,'⅜'],[1/2,'½'],[5/8,'⅝'],[2/3,'⅔'],[3/4,'¾'],[7/8,'⅞']];
  const whole=Math.floor(n);
  const frac=n-whole;
  let fracStr='';
  if(frac>0.01){
    const best=fracs.reduce((a,b)=>Math.abs(b[0]-frac)<Math.abs(a[0]-frac)?b:a);
    if(Math.abs(best[0]-frac)<0.07)fracStr=best[1];
    else fracStr=frac.toFixed(2).replace(/\.?0+$/,'').replace('0.','.');
  }
  if(whole===0)return fracStr||n.toFixed(2).replace(/\.?0+$/,'');
  return fracStr?`${whole}${fracStr}`:`${whole}`;
}
function scaleIngredient(text,factor){
  if(factor===1||!text)return text;
  // Match: optional leading number (whole or fraction or unicode) immediately followed by optional unit letter
  // e.g. "35g", "1/2 cup", "1 1/2 cups", "¾ tsp", "2.5 tbsp"
  const qtyRx=/^([\d¼½¾⅓⅔⅛⅜⅝⅞]+(?:[\s\/][\d]+)*(?:\.\d+)?)\s*/;
  const m=text.match(qtyRx);
  if(!m)return text;
  const rawQty=m[1].trim();
  const qty=parseQty(rawQty);
  if(qty===null||qty===0)return text;
  const scaled=qty*factor;
  const rest=text.slice(m[0].length);
  // If the next char is a letter right after digits (compact metric like "35g"), keep it attached
  const compactM=rest.match(/^([a-zA-Z]+)(.*)/);
  if(compactM&&/^(g|kg|ml|l|oz|lb|mg)$/i.test(compactM[1])){
    return fmtQty(scaled)+compactM[1]+' '+compactM[2].trim();
  }
  return fmtQty(scaled)+' '+rest;
}

function formatLastCooked(iso){
  if(!iso)return null;
  const d=new Date(iso),now=new Date();
  const days=Math.floor((now-d)/(1000*60*60*24));
  if(days===0)return'Today';
  if(days===1)return'Yesterday';
  if(days<7)return`${days} days ago`;
  if(days<30)return`${Math.floor(days/7)} week${Math.floor(days/7)!==1?'s':''} ago`;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

async function showSub(e,ingredient){
  e.stopPropagation();
  // Find the sibling div by walking up to the ingr row
  const btn=e.currentTarget;
  const row=btn.parentElement;
  const subDiv=row.nextElementSibling;
  if(!subDiv)return;
  // Toggle off if already shown
  if(subDiv.style.display==='block'){subDiv.style.display='none';subDiv.innerHTML='';return;}
  subDiv.style.display='block';
  subDiv.innerHTML=`<div class="sub-card"><div class="sub-card-label">Finding substitutes…</div><div style="font-size:.8rem;color:var(--text-3)">Asking AI…</div></div>`;
  try{
    const prompt=`You're a cooking assistant. Give 2-3 practical substitutes for: "${ingredient}"
Format as a short bulleted list. Each bullet: substitute → brief note on taste/texture difference.
Be concise — 1 line per substitute max.`;
    const data=await callGroq([],prompt);
    const raw=(data.choices?.[0]?.message?.content||'').trim();
    subDiv.innerHTML=`<div class="sub-card"><div class="sub-card-label">Substitutes for ${escH(ingredient.replace(/^\d[\d\s\/¼½¾⅓⅔⅛.]*\s*(?:g|kg|ml|l|oz|lb|cup|tbsp|tsp|cups|cloves?|bunch|can)?\s*/i,''))}</div><div style="white-space:pre-wrap">${escH(raw)}</div></div>`;
  }catch(err){
    subDiv.innerHTML=`<div class="sub-card"><div class="sub-card-label">Error</div>Could not fetch substitutes. Check your connection.</div>`;
  }
}

function buildExportText(r,factor){
  factor=factor||1;
  let out=r.name+'\n'+'='.repeat(r.name.length)+'\n\n';
  if(r.yield)out+=`Yield: ${r.yield}\n`;
  if(r.prepTime)out+=`Prep: ${r.prepTime}\n`;
  if(r.cookTime)out+=`Cook: ${r.cookTime}\n`;
  if(r.totalTime)out+=`Total: ${r.totalTime}\n`;
  if(r.calories)out+=`Calories: ~${r.calories} per serving\n`;
  out+='\nINGREDIENTS\n-----------\n';
  (r.ingredients||[]).forEach(sec=>{
    if(sec.section&&r.ingredients.length>1)out+=`\n${sec.section}:\n`;
    (sec.items||[]).forEach(item=>out+=`• ${scaleIngredient(item,factor)}\n`);
  });
  out+='\nSTEPS\n-----\n';
  (r.steps||[]).forEach((s,i)=>out+=`${i+1}. ${s.instructions}\n\n`);
  if(r.notes)out+=`\nNOTES\n-----\n${r.notes}\n`;
  return out;
}

      </div>
      <div class="modal-actions">
        <button class="btn btn-terra" style="flex:1" onclick="copyExport()">Copy text</button>
        <button class="btn btn-outline" style="flex:1" onclick="window.print()">Print</button>
        <button class="btn btn-ghost" onclick="document.getElementById('export-modal').remove()">Close</button>
      </div>

function copyExport(){
  const el=document.getElementById('export-text-content');
  if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>showToast('Copied to clipboard!')).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=el.textContent;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    showToast('Copied!');
  });
}

Return ONLY this JSON (no markdown fences, no extra text):

function fmtTime(s){
  if(s<=0)return'0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`;
}
function hoText(r){
  const m=r.steps.reduce((a,s)=>a+(s.timerMinutes||0),0);
  if(!m)return null;
  const h=Math.floor(m/60),mn=m%60;
  return h&&mn?`${h}h ${mn}m`:h?`${h}h`:`${mn}m`;
}
function escH(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function getRecipe(){return recipes.find(r=>r.id===state.activeRecipeId)||null;}
function parseIngredient(text){
  const m=text.match(/^((?:[\d¼½¾⅓⅔\/\.\-]+\s*)+(?:g|kg|ml|l|oz|lb|lbs|tsp|tbsp|cup|cups|clove|cloves|bunch|small|medium|large|pinch|handful|can|tin|pack|slice|slices|piece|pieces|sprig|sprigs|head|pod|pods?)?\s*)/i);
  if(m&&m[1].trim())return{qty:m[1].trim(),name:text.slice(m[1].length).trim()};
  return{qty:'',name:text};
}
function categorize(text){
  const t=text.toLowerCase();
  if(/flour|yeast|baking powder|baking soda|sourdough|starter|whole wheat|cocoa|chocolate/.test(t))return'baking';
  if(/milk|cream|butter|egg|cheese|yogurt|parmesan|mozzarella|cheddar|ricotta|gouda|feta/.test(t))return'dairy & eggs';
  if(/chicken|beef|pork|lamb|salmon|tuna|shrimp|prawn|fish|bacon|sausage|turkey|duck|mince|ground meat/.test(t))return'meat & fish';
  if(/pepper|cumin|coriander|paprika|turmeric|cinnamon|nutmeg|cardamom|clove|star anise|bay leaf|oregano|thyme|rosemary|basil|dill|mint|parsley|cilantro|sage|chive|herb|spice|seasoning|saffron|cayenne|chili|chilli/.test(t))return'herbs & spices';
  if(/garlic|onion|carrot|celery|tomato|potato|lemon|lime|ginger|scallion|shallot|leek|zucchini|mushroom|spinach|lettuce|cucumber|avocado|apple|pear|berry|fruit|broccoli|cauliflower|eggplant|capsicum|asparagus|pumpkin|squash|corn|spring onion/.test(t))return'produce';
  if(/salt|oil|vinegar|sauce|paste|broth|stock|canned|honey|syrup|vanilla|rice|pasta|noodle|lentil|bean|oat|sugar|soy|coconut|wine/.test(t))return'pantry';
  return'other';
}

function addToShopList(recipeId){
  const r=recipes.find(r=>r.id===recipeId);if(!r)return;
  shoppingList=shoppingList.filter(i=>i.recipeId!==recipeId);
  (r.ingredients||[]).forEach(sec=>{
    (sec.items||[]).forEach(item=>{
      const{name,qty}=parseIngredient(item);
      shoppingList.push({id:Date.now()+Math.random(),name:name||item,qty,category:categorize(name||item),checked:false,recipeId,recipeName:r.name});
    });
  });
  saveShopList();showToast(`${r.name} added to shopping list`);
}
function toggleShopItem(id){
  const i=shoppingList.find(i=>i.id===id);if(i)i.checked=!i.checked;
  saveShopList();patchShopList();
}
function removeRecipeFromShop(recipeId){
  shoppingList=shoppingList.filter(i=>i.recipeId!==recipeId);
  saveShopList();render();
}
function showConfirm({title,msg,confirmLabel,confirmClass,onConfirm}){
  const id='confirm-backdrop-'+Date.now();
  const div=document.createElement('div');
  div.className='confirm-backdrop';div.id=id;
  div.innerHTML=`
    <div class="confirm-sheet" onclick="event.stopPropagation()">
      <div class="confirm-title">${escH(title)}</div>
      <div class="confirm-msg">${escH(msg)}</div>
      <div class="confirm-btns">
        <button class="btn ${confirmClass||'btn-terra'} btn-full" id="${id}-ok">${escH(confirmLabel||'Confirm')}</button>
        <button class="btn btn-ghost btn-full" onclick="document.getElementById('${id}').remove()">Cancel</button>
      </div>
    </div>`;
  div.addEventListener('click',()=>div.remove());
  document.body.appendChild(div);
  document.getElementById(id+'-ok').addEventListener('click',()=>{div.remove();onConfirm();});
}
function clearChecked(){
  shoppingList=shoppingList.filter(i=>!i.checked);
  saveShopList();renderShopList();
}
function clearAll(){
  showConfirm({
    title:'Clear entire list?',
    msg:'This will remove all '+shoppingList.length+' item'+(shoppingList.length===1?'':'s')+' from your shopping list.',
    confirmLabel:'Clear all',

let _actx=null;
function getACtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function beep(freq,dur){
  try{const ctx=getACtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.value=freq;osc.type='sine';
    g.gain.setValueAtTime(0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playDone(){[0,500,1000].forEach(d=>setTimeout(()=>beep(880,.4),d));setTimeout(()=>beep(1100,.6),1700);}

//  GUIDED TIMER ENGINE  (endTime-based for persistence)
// ═══════════════════════════════════════
const CIRC=2*Math.PI*52;
function timerOffset(t){return CIRC*(t.total?1-t.remaining/t.total:0);}
function startTimer(totalSec,label){
  stopTimer();
  const endTime=Date.now()+(totalSec*1000);
  state.timer={remaining:totalSec,total:totalSec,running:true,done:false,_id:null,endTime,label};
  save('k_timer',{endTime,totalSec,label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
  state.timer._id=setInterval(tickTimer,250);
  askNotifPerm();
}
function tickTimer(){
  const t=state.timer;if(!t.running)return;
  const remaining=Math.max(0,Math.ceil((t.endTime-Date.now())/1000));
  t.remaining=remaining;
  if(remaining<=0){
    t.remaining=0;t.running=false;t.done=true;
    clearInterval(t._id);t._id=null;
    localStorage.removeItem('k_timer');
    playDone();
    sendNotif('Timer complete!',t.label||'Your timer is done.');
  }
  patchTimer();
}
function pauseTimer(){
  clearInterval(state.timer._id);state.timer._id=null;state.timer.running=false;
  save('k_timer',{endTime:state.timer.endTime,totalSec:state.timer.total,label:state.timer.label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
  patchTimer();
}
function resumeTimer(){
  if(state.timer.done)return;
  // Recalculate endTime from remaining
  state.timer.endTime=Date.now()+(state.timer.remaining*1000);
  state.timer.running=true;
  state.timer._id=setInterval(tickTimer,250);
  save('k_timer',{endTime:state.timer.endTime,totalSec:state.timer.total,label:state.timer.label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
}
function stopTimer(){
  clearInterval(state.timer._id);state.timer={...TIMER_ZERO};
  localStorage.removeItem('k_timer');
}
function skipTimer(){stopTimer();goNext();}
async function uploadRecipeCover(recipeId,input){
  const file=input?.files?.[0];
  if(!file)return;
  const dataURL=await fileToDataURL(file);
  const compressed=await compressImage(dataURL,1200,0.82);
  const r=recipes.find(x=>x.id===recipeId);
  if(!r)return;
  r.image=compressed;
  save('k_recipes',recipes);
  render();
}
function uploadRecipeCoverPrompt(recipeId){
  let inp=document.getElementById('_cover-upload-input');
  if(!inp){
    inp=document.createElement('input');
    inp.type='file';inp.id='_cover-upload-input';inp.accept='image/*';
    inp.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none';
    document.body.appendChild(inp);
  }
  inp.onchange=()=>{uploadRecipeCover(recipeId,inp);inp.value='';};
  inp.click();
}
function applyCustomTimer(){
  const input=document.getElementById('custom-timer-input');
  const mins=parseInt(input?.value||'0',10);
  if(!mins||mins<1){return;}
  const r=getRecipe();
  if(!r)return;
  const step=r.steps[state.stepIndex];
  // Persist the new timer value on the step
  step.timerMinutes=mins;
  step.timerLabel=step.timerLabel&&step.timerLabel!==`${step.timerMinutes} min`?step.timerLabel:`${mins} min`;
  save('k_recipes',recipes);
  // Reset and start the timer
  stopTimer();
  state.timer={...TIMER_ZERO,remaining:mins*60,total:mins*60,label:step.timerLabel};
  render();
}
// Restore timer when app opens or returns from background
function restoreTimer(){
  const stored=load('k_timer',null);
  if(!stored)return;
  const remaining=Math.max(0,Math.ceil((stored.endTime-Date.now())/1000));
  if(remaining<=0){
    localStorage.removeItem('k_timer');
    // If we're on the same step, mark done
    if(stored.recipeId===state.activeRecipeId&&stored.stepIndex===state.stepIndex){
      state.timer={...TIMER_ZERO,done:true,remaining:0,total:stored.totalSec,label:stored.label};
      playDone();
    }
    return;
  }
  state.timer={remaining,total:stored.totalSec,running:false,done:false,_id:null,endTime:stored.endTime,label:stored.label};
  if(stored.recipeId)state.activeRecipeId=stored.recipeId;
  if(stored.stepIndex!=null)state.stepIndex=stored.stepIndex;
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    // Returning from background — sync timer from endTime
    if(state.timer.endTime&&state.timer.running){
      const remaining=Math.max(0,Math.ceil((state.timer.endTime-Date.now())/1000));
      state.timer.remaining=remaining;
      if(remaining<=0){
        state.timer.remaining=0;state.timer.running=false;state.timer.done=true;
        clearInterval(state.timer._id);state.timer._id=null;
        localStorage.removeItem('k_timer');
        playDone();
        sendNotif('Timer complete!',state.timer.label||'Your timer is done.');
      }
      patchTimer();
    }
    // Also sync QT
    if(state.qt.endTime&&state.qt.running){
      const remaining=Math.max(0,Math.ceil((state.qt.endTime-Date.now())/1000));
      state.qt.remaining=remaining;
      if(remaining<=0){
        state.qt.remaining=0;state.qt.running=false;state.qt.done=true;
        clearInterval(state.qt._id);state.qt._id=null;
        playDone();sendNotif('Timer complete!','Your kitchen timer is done.');
      }
      patchQT();
    }
  }
});
function patchTimer(){
  const t=state.timer;
  const disp=document.getElementById('t-display');
  if(disp){disp.textContent=fmtTime(t.remaining);disp.className='t-time'+(t.done?' done':'');}
  const ring=document.getElementById('t-ring');
  if(ring)ring.setAttribute('stroke-dashoffset',timerOffset(t).toFixed(2));
  const ringc=document.getElementById('t-ringc');
  if(ringc)ringc.setAttribute('stroke',t.done?'#2A9D5C':'#D4705A');
  const sub=document.getElementById('t-sub');
  if(sub)sub.textContent=t.done?'done':'remaining';
  const ctrl=document.getElementById('t-ctrl');
  if(ctrl){ctrl.innerHTML=timerCtrlHTML();bindTimerBtns();}
  // Also update timer tab if visible
  patchTimerTab();
}
function timerCtrlHTML(){
  const t=state.timer;
  if(t.done)return`<button class="btn btn-terra" id="tb-cont">${I.fwd} Continue</button>`;
  if(!t.running&&t.remaining===t.total)
    return`<button class="btn btn-terra" id="tb-start">${I.play} Start Timer</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
  if(t.running)
    return`<button class="btn btn-ghost" id="tb-pause">${I.pause} Pause</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
  return`<button class="btn btn-terra" id="tb-resume">${I.play} Resume</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
}
function bindTimerBtns(){
  const el=(id,fn)=>{const b=document.getElementById(id);if(b)b.onclick=fn;};
  el('tb-start',()=>{const r=getRecipe();if(r)startTimer(r.steps[state.stepIndex].timerMinutes*60,r.steps[state.stepIndex].timerLabel);});
  el('tb-pause',pauseTimer);el('tb-resume',resumeTimer);
  el('tb-skip',skipTimer);el('tb-cont',goNext);
}

const QT_PRESETS=[5,10,15,20,30,45,60];
function setQTPreset(min){
  clearInterval(state.qt._id);
  state.qt={remaining:min*60,total:min*60,running:false,done:false,_id:null,endTime:null,preset:min};

function startQT(){
  clearInterval(state.qt._id);
  const endTime=Date.now()+(state.qt.remaining*1000);
  state.qt.endTime=endTime;state.qt.running=true;state.qt.done=false;
  state.qt._id=setInterval(tickQT,250);
  save('k_qt',{endTime,totalSec:state.qt.total});
  askNotifPerm();
}
function tickQT(){
  const t=state.qt;if(!t.running)return;
  const remaining=Math.max(0,Math.ceil((t.endTime-Date.now())/1000));
  t.remaining=remaining;
  if(remaining<=0){
    t.remaining=0;t.running=false;t.done=true;
    clearInterval(t._id);t._id=null;localStorage.removeItem('k_qt');
    playDone();sendNotif('Timer complete!','Your kitchen timer is done.');
  }
  patchQT();
}
function pauseQT(){clearInterval(state.qt._id);state.qt._id=null;state.qt.running=false;patchQT();}
function resetQT(){clearInterval(state.qt._id);state.qt={...state.qt,remaining:state.qt.total,running:false,done:false,_id:null};patchQT();}
function patchQT(){
  const t=state.qt;
  const td=document.getElementById('qt-time');if(td){td.textContent=fmtTime(t.remaining);td.className='qt-time'+(t.done?' done':'');}
  const tbs=document.getElementById('qt-btns');if(tbs)tbs.innerHTML=qtBtnsHTML();
  document.querySelectorAll('.preset-btn').forEach(b=>{b.classList.toggle('on',parseInt(b.dataset.min)===t.preset);});

function qtBtnsHTML(){
  const t=state.qt;
  if(!t.total)return`<span style="font-size:.84rem;color:var(--text-3)">Select a duration above</span>`;
  if(t.done)return`<button class="btn btn-ghost" onclick="resetQT()">Reset</button>`;
  if(!t.running)return`<button class="btn btn-terra" onclick="startQT()">${I.play} Start</button><button class="btn btn-ghost" onclick="resetQT()">Reset</button>`;
  return`<button class="btn btn-ghost" onclick="pauseQT()">${I.pause} Pause</button><button class="btn btn-ghost" onclick="resetQT()">Reset</button>`;
}
function patchTimerTab(){

function goTab(tab){
  // Remember recipe context when leaving the recipes tab
  if(tab!=='recipes'&&(state.view==='detail'||state.view==='full'||state.view==='guided')){
    state._prevRecipeId=state.activeRecipeId;
  } else if(tab==='recipes'){
    state._prevRecipeId=null;
  }
  state.tab=tab;
  if(tab!=='recipes'&&state.view==='guided')return;
  state.view='list';
  render();
}
function goBackToRecipe(){
  const id=state._prevRecipeId;
  state._prevRecipeId=null;
  go('detail',{id});
}
function go(view,opts={}){
  if(view!=='full')stopTimer();
  state.view=view;state.tab='recipes';
  if(opts.id!==undefined)state.activeRecipeId=opts.id;
  if(view==='guided'){state.stepIndex=0;state.timer={...TIMER_ZERO};}
  if(view==='detail')state.detailTab='ingredients';
  render();
}
function goNext(){
  const r=getRecipe();if(!r)return;
  stopTimer();
  if(state.stepIndex>=r.steps.length-1){state.view='complete';render();return;}
  state.stepIndex++;state.timer={...TIMER_ZERO};render();
}
function goPrev(){
  if(state.stepIndex<=0)return;
  stopTimer();state.stepIndex--;state.timer={...TIMER_ZERO};render();
}
function setDTab(t){state.detailTab=t;render();}
function setShopTab(t){state.shopTab=t;render();}
function setAddTab(t){state.addTab=t;if(t!=='ai'){}render();}

let _tx=0,_ty=0;
function attachSwipe(){
  const c=document.getElementById('guided-body');if(!c)return;
  c.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
  c.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?goNext():goPrev();}
  },{passive:true});
}

  pasta:['spaghetti','penne','rigatoni','fettuccine','linguine','tagliatelle','lasagna','carbonara','bolognese','orzo','bucatini'],
  cake:['cupcake','muffin','brownie','sponge','torte','layer cake','bundt','loaf cake'],

  chicken:['poultry','breast','thigh','wing','drumstick','rotisserie'],
  beef:['steak','burger','mince','ground beef','brisket','sirloin','ribeye','chuck'],
  fish:['salmon','tuna','cod','halibut','tilapia','seafood','shrimp','prawn','scallop','crab'],
  cookie:['biscuit','brownie','snickerdoodle','shortbread','oatmeal raisin','chocolate chip'],
  dessert:['cake','cookie','pie','pudding','tart','gelato','mousse','sorbet','parfait'],
  breakfast:['pancake','waffle','omelette','frittata','eggs','toast','crepe','granola','porridge'],
  salad:['slaw','greens','vinaigrette','tossed','caesar','nicoise'],

function recipeBlob(r){
  return[
    r.name||'',
    r.description||'',
    (r.ingredients||[]).map(s=>(s.items||[]).join(' ')).join(' '),
    (r.steps||[]).map(s=>s.instructions||'').join(' '),
  ].join(' ').toLowerCase();
}
function recipeMatchesQuery(r,q){
  const words=q.toLowerCase().split(/\s+/).filter(Boolean);
  const blob=recipeBlob(r);
  return words.every(w=>{
    const terms=[w,...(SEARCH_RELATED[w]||[])];
    return terms.some(t=>blob.includes(t));
  });
}
function cardsHTML(q){
  const visible=q?recipes.filter(r=>recipeMatchesQuery(r,q)):recipes;
  return visible.length?visible.map(r=>{
    const ho=hoText(r);
    const img=r.image?`<img class="rc-img" src="${escH(r.image)}" alt="${escH(r.name)}" onerror="this.outerHTML='<div class=rc-img-ph>${escH(r.name.charAt(0))}</div>'">`:`<div class="rc-img-ph">${escH(r.name.charAt(0))}</div>`;
    const metaStr=[ho||r.totalTime,r.yield].filter(Boolean).join(' · ');
    return`<div class="recipe-card" onclick="go('detail',{id:${r.id}})">
      ${img}
      <div class="rc-body">
        <div class="rc-name">${escH(r.name)}</div>
        ${metaStr?`<div class="rc-meta">${I.clock} ${escH(metaStr)}</div>`:''}
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px">
          ${r.difficulty?`<span class="rc-chip">${escH(r.difficulty)}</span>`:''}
          ${r.calories?`<span class="rc-chip" style="background:var(--bg-2);color:var(--text-2)">${escH(r.calories)} cal/serving</span>`:''}
        </div>
      </div>
    </div>`;
  }).join(''):(q?`<div class="empty"><div class="empty-icon">${I.utensils}</div><h3>No results</h3><p>No recipes match "${escH(q)}".</p></div>`:`<div class="empty"><div class="empty-icon">${I.utensils}</div><h3>No recipes yet</h3><p>Import from URL or add one manually.</p></div>`);
}

function renderGuided(){

  const pct=Math.round((idx/total)*100);

  // Initialise timer state for this step if needed
  if(step.timerMinutes&&state.timer.total===0&&!state.timer.done){
    state.timer={...TIMER_ZERO,remaining:step.timerMinutes*60,total:step.timerMinutes*60,label:step.timerLabel||''};
  }
  const t=state.timer;
  const timerHTML=step.timerMinutes?`
    <div class="step-timer-wrap">
      <div class="t-label">${escH(step.timerLabel||'Timer')}</div>

    </div>`
  :`<div style="margin:18px 0 4px;display:flex;align-items:center;gap:8px;justify-content:center">

      <span style="font-size:.82rem;color:var(--text-3)">min</span>
      <button onclick="applyCustomTimer()" style="font-size:.8rem;padding:5px 12px;border-radius:8px;background:var(--terra);color:#fff;border:none;cursor:pointer;font-weight:600">Add Timer</button>
    </div>`;
  const stepImg='';
  // Build ingredients sheet content
  const ingrSecs=r.ingredients||[];
  const multiIngrSec=ingrSecs.length>1&&ingrSecs.some(s=>s.section);
  const ingrSheetRows=''; // generated dynamically via renderScaledSheetRows
  const _ingrRowsStatic=ingrSecs.map(sec=>`
    ${multiIngrSec&&sec.section?`<div class="ingr-sheet-sec">${escH(sec.section)}</div>`:''}
    ${(sec.items||[]).map(it=>`<div class="ingr-sheet-row">${escH(it)}</div>`).join('')}
  `).join('');
  const totalIngrCount=ingrSecs.reduce((s,sec)=>s+(sec.items?.length||0),0);

  document.getElementById('app').innerHTML=`
    <div class="guided-shell">
      <div class="guided-top">
        <button class="ibtn" onclick="go('detail',{id:${r.id}})">${I.back}</button>
        <div class="guided-label">Step ${idx+1} of ${total}</div>
      </div>
      <div class="guided-prog"><div class="guided-prog-fill" style="width:${pct}%"></div></div>
      <div class="guided-body fade-up" id="guided-body">
        ${step.phase?`<div class="guided-phase"><span class="guided-phase-dot" style="background:${color}"></span><span style="color:${color}">${escH(step.phase)}</span></div>`:''}
        <div class="guided-instructions">${escH(step.instructions)}</div>
        ${step.tip?`<div class="guided-tip"><div class="guided-tip-label">Tip</div>${escH(step.tip)}</div>`:''}
        ${stepImg}
        ${timerHTML}
      </div>

          <button class="rbtn rbtn-white" onclick="go('detail',{id:${r.id}})" title="Recipe overview">${I.book}</button>

  };
  window.closeIngrSheet=function(){
    document.getElementById('ingr-overlay')?.classList.remove('open');
    document.getElementById('ingr-sheet')?.classList.remove('open');
  };
}

function renderFull(){

  (r.steps||[]).forEach((s,i)=>{
    const last=groups[groups.length-1];
    if(last&&last.phase===s.phase){last.steps.push({s,i});}
    else{groups.push({phase:s.phase,steps:[{s,i}]});}
  });
  // Build steps HTML
  const showHdrsFull=groups.length>1&&groups.some(g=>g.phase!=='');
  let stepsHTML='';
  groups.forEach(g=>{
    const color=pc(g.phase);
    if(showHdrsFull&&g.phase!==''){
      stepsHTML+=`<div class="full-phase-hdr"><span class="full-phase-dot" style="background:${color}"></span><span style="color:${color}">${escH(g.phase)}</span></div>`;
    }
    g.steps.forEach(({s,i})=>{

        <div class="detail-name">${escH(r.name)}</div>
        <div class="detail-meta">${I.clock} ${ho2?ho2+' hands-off':r.totalTime||''}${r.yield?` &nbsp;·&nbsp; ${escH(r.yield)}`:''}</div>
        ${(r.prepTime||r.cookTime||r.course||r.cuisine||r.calories)?`

function shopBodyHTML(){
  if(state.shopTab==='aisle'){
    if(!shoppingList.length)return`<div class="shop-empty"><div class="shop-empty-icon">${I.list}</div><h3>Your list is empty</h3><p>Add ingredients from any recipe.</p></div>`;
    const cats={};
    shoppingList.forEach(i=>{(cats[i.category]=cats[i.category]||[]).push(i);});
    return Object.entries(cats).sort(([a],[b])=>a.localeCompare(b)).map(([cat,items])=>`
      <div class="shop-cat-name">${escH(cat)}</div>
      ${items.map(i=>`
        <div class="shop-item">
          <button class="shop-cb ${i.checked?'on':''}" onclick="toggleShopItem(${i.id})">${i.checked?I.check:''}</button>
          <span class="shop-item-name${i.checked?' on':''}">${escH(i.name)}</span>
          <span class="shop-item-qty">${escH(i.qty)}</span>
        </div>`).join('')}`).join('');
  }else{
    const byRecipe={};
    shoppingList.forEach(i=>{(byRecipe[i.recipeId]=byRecipe[i.recipeId]||{name:i.recipeName,items:[]}).items.push(i);});
    if(!Object.keys(byRecipe).length)return`<div class="shop-empty"><div class="shop-empty-icon">${I.list}</div><h3>Your list is empty</h3><p>Add ingredients from any recipe.</p></div>`;
    return Object.entries(byRecipe).map(([rid,group])=>`
      <div class="shop-rcp-name">${escH(group.name)}<button class="shop-rcp-remove" onclick="removeRecipeFromShop(${rid})">Remove</button></div>
      ${group.items.map(i=>`
        <div class="shop-item">
          <button class="shop-cb ${i.checked?'on':''}" onclick="toggleShopItem(${i.id})">${i.checked?I.check:''}</button>

          <span class="shop-item-qty">${escH(i.qty)}</span>
        </div>`).join('')}`).join('');
  }
}

// Compress image — tries createImageBitmap first, falls back to Image element
async function compressImage(dataURL,maxDim=1536,quality=0.85){
  function drawAndEncode(source,w,h,q){
    const cv=document.createElement('canvas');
    cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(source,0,0,w,h);
    return cv.toDataURL('image/jpeg',q);
  }
  function calcDims(origW,origH,max){
    if(origW<=max&&origH<=max)return[origW,origH];
    return origW>origH
      ?[max,Math.round(origH*max/origW)]
      :[Math.round(origW*max/origH),max];
  }
  // Method 1: createImageBitmap (best for desktop Chrome with JPEG/PNG/WebP)
  try{
    const blob=await fetch(dataURL).then(r=>r.blob());
    const bmp=await createImageBitmap(blob);
    const[w,h]=calcDims(bmp.width,bmp.height,maxDim);
    const result=drawAndEncode(bmp,w,h,quality);
    if(bmp.close)bmp.close();
    return result;
  }catch(e){
    console.warn('createImageBitmap failed:',e.message);
  }
  // Method 2: Image element (fallback)
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const[w,h]=calcDims(img.width,img.height,maxDim);
        res(drawAndEncode(img,w,h,quality));
      }catch(e2){
        console.warn('Image element compress failed:',e2.message);
        res(dataURL);
      }
    };
    img.onerror=()=>{
      console.warn('Image failed to load — unsupported format?');
      res(dataURL);
    };
    img.src=dataURL;
  });
}
// Compress for API: iteratively shrink until base64 is under ~400KB
async function compressForAPI(dataURL){
  // Start higher for text readability — drop only if too large
  const attempts=[
    [1600,0.82],[1200,0.78],[1000,0.72],[800,0.65],[600,0.55],[400,0.45]
  ];
  for(let i=0;i<attempts.length;i++){
    const[dim,q]=attempts[i];
    const out=await compressImage(dataURL,dim,q);
    const kb=Math.round(out.length/1024);
    console.log(`compress attempt ${i+1}: ${dim}px q=${q} → ${kb}KB`);
    if(out.length<600*1024)return out; // 600KB limit — Groq handles this fine
  }
  console.warn('Could not compress below 600KB; sending smallest');
  return compressImage(dataURL,400,0.4);
}
// Load heic2any on demand for HEIC→JPEG conversion
async function loadHeic2Any(){
  if(window.heic2any)return window.heic2any;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js';
    s.onload=()=>res(window.heic2any);
    s.onerror=()=>rej(new Error('Could not load HEIC converter'));
    document.head.appendChild(s);
  });
}
async function normalizeFile(file){
  const isHeic=/heic|heif/i.test(file.type||file.name||'');
  if(!isHeic)return fileToDataURL(file);
  try{
    const converter=await loadHeic2Any();
    const jpegBlob=await converter({blob:file,toType:'image/jpeg',quality:0.9});
    return fileToDataURL(jpegBlob);
  }catch(e){
    console.warn('HEIC conversion failed:',e.message);
    return fileToDataURL(file);
  }
}
async function processScanFiles(fileList){
  const files=Array.from(fileList);
  if(!files.length)return;
  const hasHeic=files.some(f=>/heic|heif/i.test(f.type||f.name||''));
  if(hasHeic){
    // Show converting state before async work
    scanForm={...scanForm,status:'converting'};renderAdd();
  }
  const dataURLs=await Promise.all(files.map(normalizeFile));
  const wasEmpty=scanForm.images.length===0;
  scanForm={...scanForm,status:'viewing',images:[...scanForm.images,...dataURLs],currentIdx:wasEmpty?0:scanForm.currentIdx};
  renderAdd();
}

// USDA FoodData Central API key — free at https://fdc.nal.usda.gov/api-guide.html
async function callGroq(images,prompt){
  // Use proxy if configured (key stays server-side), otherwise fall back to user's own key
  const proxy=GROQ_PROXY.trim();
  const key=proxy?'':getGroqKey();
  if(!proxy&&!key)throw new Error('NO_KEY');
  const endpoint=proxy||'https://api.groq.com/openai/v1/chat/completions';
  const authHeader=proxy?{}:{'Authorization':`Bearer ${key}`};
  let lastErr='';
  for(const model of GROQ_MODELS){
    try{
      console.log('→ trying model:',model,'via',proxy?'proxy':'direct');
      const payload=JSON.stringify({model,messages:[{role:'user',content:[
        ...images.map(img=>({type:'image_url',image_url:{url:img}})),
        {type:'text',text:prompt}
      ]}],temperature:0.1,max_tokens:2048});
      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),90000);
      let resp;
      try{
        resp=await fetch(endpoint,{
          method:'POST',
          headers:{'Content-Type':'application/json',...authHeader},
          body:payload,
          signal:controller.signal
        });
      }finally{clearTimeout(tid);}
      const json=await resp.json();
      if(!resp.ok){
        const msg=json?.error?.message||`HTTP ${resp.status}`;
        console.warn(model,'→',msg);
        lastErr=msg;
        continue;
      }
      console.log('✓ success with',model);
      return json;
    }catch(e){
      lastErr=e.name==='AbortError'?'Request timed out after 90s — check your network connection':e.message;
      console.warn(model,'failed:',lastErr);
    }
  }
  throw new Error(lastErr||'All Groq models failed');
}
// Convert [{section,items}] or flat string[] → textarea text with "--- Section" markers
function buildIngrText(ingredients){
  if(!ingredients||!ingredients.length)return'';
  // Flat string array (fallback)
  if(typeof ingredients[0]==='string'){
    return ingredients.join('\n');
  }
  // Sectioned array
  const sections=ingredients.filter(s=>s&&s.items&&s.items.length);
  if(sections.length===1&&/^ingredients$/i.test(sections[0].section||'')){
    return sections[0].items.join('\n');
  }
  return sections.map(s=>{
    const header=s.section&&!/^ingredients$/i.test(s.section)?`--- ${s.section}\n`:'';
    return header+(s.items||[]).join('\n');
  }).join('\n');
}
// Parse textarea text (with optional "--- Section" markers) → [{section,items}]
function parseIngrText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const sections=[];
  let cur={section:'Ingredients',items:[]};
  for(const l of lines){
    if(l.startsWith('---')){
      if(cur.items.length)sections.push({...cur});
      cur={section:l.replace(/^-+\s*/,'').trim()||'Ingredients',items:[]};
    }else{
      cur.items.push(l);
    }
  }
  if(cur.items.length)sections.push({...cur});
  return sections.length?sections:[{section:'Ingredients',items:[]}];
}
function parseGroqJSON(raw){
  // Strip markdown fences
  let s=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  // Try direct parse
  try{return JSON.parse(s);}catch(_){}
  // Find the outermost balanced {...} block
  const start=s.indexOf('{');
  if(start===-1)throw new Error('No JSON object found in response');
  let depth=0,end=-1;
  for(let i=start;i<s.length;i++){
    if(s[i]==='{')depth++;
    else if(s[i]==='}'){depth--;if(depth===0){end=i;break;}}
  }
  if(end===-1)throw new Error('Incomplete JSON in response');
  try{return JSON.parse(s.slice(start,end+1));}catch(e){
    throw new Error('Could not parse recipe JSON: '+e.message);
  }
}
async function scanExtractWithGroq(){
  if(!GROQ_PROXY.trim()&&!getGroqKey()){state.view='settings';render();return;}
  if(!scanForm.images.length){showToast('Add at least one photo first');return;}
  scanForm={...scanForm,status:'loading'};renderAdd();
  try{
    // Quick reachability check — only when using a direct key (skip if proxy handles auth)
    if(!GROQ_PROXY.trim()){
      try{
        const ping=await fetch('https://api.groq.com/openai/v1/models',{
          headers:{'Authorization':`Bearer ${getGroqKey()}`},
          signal:AbortSignal.timeout(8000)
        });
        if(!ping.ok&&ping.status===401)throw new Error('Invalid API key');
        console.log('✓ Groq reachable, status:',ping.status);
      }catch(e){
        if(e.name==='TimeoutError'||e.name==='AbortError')
          throw new Error('Cannot reach the Groq API from this network. Photo scanning may be blocked by a firewall or VPN. Try on a different network or use mobile.');
        if(e.message.includes('API key'))throw e;
        console.warn('Ping failed (non-fatal):',e.message);
      }
    }
    // Compress all images — send together so AI sees the full recipe context
    const compressed=await Promise.all(scanForm.images.map(d=>compressForAPI(d)));
    const n=compressed.length;
    const prompt=`You are a recipe extraction assistant. ${n>1?`These are ${n} pages of the same recipe, in order.`:'This is a recipe.'} Read EVERY word on ${n>1?'all pages':'the image'} carefully.
Extract the COMPLETE recipe. Do not skip, summarise, or reorder anything.
Rules:
- Extract ALL ingredients listed before the instructions, even if there is no "Ingredients" heading — they may just appear as a plain list at the top
- IMPORTANT: Many cookbook pages use a TWO-COLUMN layout where the LEFT column lists the ingredients (sometimes only labeled "Serves X" or with no heading at all) and the RIGHT column contains the cooking instructions. If you see this layout, carefully extract the left column as ingredients and the right column as steps — do NOT mix them together.
- If ingredients are grouped into sections (e.g. "For the dough", "For the sauce", "Topping"), preserve those sections exactly
- Include ALL ingredients with exact quantities (e.g. "450g strong bread flour", "1¼ tsp fine sea salt")
- Include ALL steps in the correct order with complete text
- Steps must follow the numbered/ordered sequence shown
- "Serves X", "Makes X", yield information, and serving size labels are NOT ingredients — do not include them in the ingredients list
Return ONLY this JSON, nothing else, no markdown:
{"name":"Recipe Name","prepTime":"15 min","cookTime":"30 min","totalTime":"45 min","course":"Dinner","cuisine":"Italian","servings":"4 servings","calories":"320","notes":"Any recipe notes or tips here","ingredients":[{"section":"For the Dough","items":["450g flour","7g yeast"]},{"section":"For the Sauce","items":["2 tbsp olive oil"]}],"steps":["Full step 1.","Full step 2."]}
If there is only one ingredient group (with or without a heading), use: {"section":"Ingredients","items":[...]}
If a field is not present in the recipe, omit it or use an empty string.
Important: ignore any photos or images within the recipe — only extract text.`;
    const data=await callGroq(compressed,prompt);
    const raw=data.choices?.[0]?.message?.content||'';
    const recipe=parseGroqJSON(raw);
    // If ingredients came back empty, do a dedicated second pass just for ingredients.
    // This handles two-column cookbook layouts where the model misses the left column.
    const ingrs=Array.isArray(recipe.ingredients)?recipe.ingredients:[];
    const totalItems=ingrs.reduce((n,s)=>n+(Array.isArray(s.items)?s.items.length:1),0);
    if(totalItems<2){
      try{
        const ingrPrompt=`Look at this recipe image carefully. Your ONLY job is to find and list ALL the ingredients.
The ingredients may appear in a LEFT column alongside the cooking instructions (this is a common cookbook layout). They may have no heading, or just say "Serves X" or "Makes X" above them. Look everywhere — left column, top section, any list of food items with quantities.
Return ONLY this JSON, nothing else:
{"ingredients":[{"section":"Ingredients","items":["item 1 with quantity","item 2 with quantity"]}]}
Do not include serving size, yield, or cooking instructions. Only food items with their quantities.`;
        const ingrData=await callGroq([compressed[0]],ingrPrompt);
        const ingrRaw=ingrData.choices?.[0]?.message?.content||'';
        const ingrJSON=parseGroqJSON(ingrRaw);
        if(ingrJSON&&(ingrJSON.ingredients||[]).length){
          recipe.ingredients=ingrJSON.ingredients;
        }
      }catch(e){console.warn('Ingredient fallback pass failed:',e);}
    }
    // ingredients can be [{section,items}] or flat string[]
    const ingrText=buildIngrText(recipe.ingredients||[]);
    scanForm={
      ...scanForm,
      status:'editing',
      name:recipe.name||'Scanned Recipe',
      ingrText,
      prepTime:recipe.prepTime||'',
      cookTime:recipe.cookTime||'',
      totalTime:recipe.totalTime||'',
      course:recipe.course||'',
      cuisine:recipe.cuisine||'',
      servings:recipe.servings||'',
      calories:recipe.calories||'',
      notes:recipe.notes||'',
      steps:(recipe.steps||[]).map(s=>({
        instructions:s,timerMinutes:detectTimer(s),
        title:summarizeStepTitle(s),phase:'',timerLabel:'',image:''
      }))
    };
    if(!scanForm.steps.length) scanForm.steps=[{instructions:'',timerMinutes:null,title:'',phase:'',timerLabel:'',image:''}];
    renderAdd();
  }catch(e){
    console.error('Groq scan error:',e);
    scanForm={...scanForm,status:'error',errorMsg:e.message||'Could not read recipe'};renderAdd();
    showToast('Could not read recipe — see details below');
  }
}
function saveScanRecipe(){
  const name=document.getElementById('scan-name')?.value.trim();
  if(!name){showToast('Please enter a recipe name');return;}
  const ingrText=document.getElementById('scan-ingr')?.value.trim()||'';
  const ingredients=parseIngrText(ingrText);
  const stepEls=document.querySelectorAll('#scan-steps-list .scan-step-ta');
  const steps=Array.from(stepEls).map(el=>{
    const inst=el.value.trim();

  if(!steps.length){showToast('Please add at least one step');return;}
  recipes.push({id:nextId++,name,description:'',image:'',yield:'',difficulty:'Intermediate',ingredients,cookware:[],steps});
  saveRecipes();scanReset();go('list');showToast('Recipe saved!');
}

// Remove website chrome, navigation, ads, and social junk from pasted text
function cleanWebJunk(text){
  const junkLine=/^\s*(?:sign\s*up|subscribe|newsletter|get notified|notify me|follow us|share this|print recipe|save recipe|jump to recipe|jump to card|rate this|leave a comment|leave a review|you may also like|related recipes?|more recipes?|popular recipes?|advertisement|sponsored|disclosure|skip to|back to top|home\s*[>»\/]|pinterest|facebook|twitter|instagram|youtube|tiktok|©|copyright|\d+\s+(?:comments?|reviews?|ratings?|shares?)|calories?:?\s*\d|prep time|cook time|total time|servings?:?\s*\d|course:|cuisine:|keyword:|author:)\s*$/i;
  const urlLine=/https?:\/\/\S+|www\.\S+/;
  const navCrumb=/^[\w\s]+(?:\s*[>»\/|]\s*[\w\s]+){2,}$/; // breadcrumbs like Home > Recipes > Bread
  return text.split('\n').filter(line=>{
    const l=line.trim();
    if(!l)return true; // keep blanks for structure
    if(l.length<3)return false;
    if(junkLine.test(l))return false;
    if(urlLine.test(l))return false;
    if(navCrumb.test(l)&&l.length<80)return false;
    return true;
  }).join('\n');
}
// Does a line look like an actual cooking step or ingredient?
// Used to filter pasted website chrome — intentionally permissive to avoid dropping real steps
function looksLikeCookingStep(s){
  if(s.length<15)return false;
  // Hard reject: clearly website junk
  if(/^(?:sign up|subscribe|newsletter|get notified|follow|share|print|save recipe|jump|advertisement|sponsored|related|more recipes|you may also|back to top|home\s*[>»])/i.test(s.trim()))return false;
  // Accept if it has a quantity or measurement
  if(/\d+\s*(?:g|kg|ml|l|cup|tbsp|tsp|oz|lb|°[CF]|min|hour|hr|clove|bunch|slice|pinch)/i.test(s))return true;
  // Accept if it contains common cooking verbs
  if(/\b(?:add|mix|stir|combine|heat|cook|bake|roast|grill|fry|boil|simmer|sauté|saute|pour|place|put|cover|remove|transfer|fold|whisk|knead|chop|dice|slice|mince|preheat|season|serve|cool|refrigerate|drain|rinse|brush|spread|sprinkle|beat|blend|bring|reduce|toss|coat|marinate|brown|sear|deglaze|fluff|shred|press|roll|shape|rise|proof|rest|allow|let stand|set aside)\b/i.test(s))return true;
  // Accept longer lines that start with a capital — likely a sentence, probably a step
  if(s.length>60&&/^[A-Z]/.test(s.trim()))return true;
  return false;
}
function parseRecipeText(text){
  // Step 1: strip website junk
  text=cleanWebJunk(text);
  // Step 2: normalise markdown — convert ## headings to plain text, strip bold/italic markers
  text=text.replace(/^#{1,6}\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^[-*]\s+/gm,'• ');
  // Detect ingredient & instruction sections
  const ingrRx=/^(?:ingredients?|what you'?ll? need|what you need|you'?ll? need|you will need|shopping list|gather(?:ed)?|for this recipe)[:\s]*/im;
  const stepsRx=/^(?:instructions?|directions?|method|steps?|how to make|preparation|procedure|for the|to make|to assemble)[:\s]*/im;
  const notesRx=/^(?:notes?|tips?|nutrition(?:al)?(?: info(?:rmation)?)?|storage|serving suggestions?|make ahead|equipment|video)[:\s]*/im;
  const ingrIdx=text.search(ingrRx);
  const stepsIdx=text.search(stepsRx);
  // Find first notes/end section that comes after steps
  const allNoteMatches=[...text.matchAll(new RegExp(notesRx.source,'gim'))];
  const notesIdx=allNoteMatches.find(m=>m.index>stepsIdx)?.index??-1;
  let ingrText='', stepsText='';
  if(ingrIdx>=0&&stepsIdx>ingrIdx){
    ingrText=text.slice(ingrIdx,stepsIdx);
    stepsText=text.slice(stepsIdx,notesIdx>stepsIdx?notesIdx:undefined);
  }else if(stepsIdx>=0){
    stepsText=text.slice(stepsIdx,notesIdx>stepsIdx?notesIdx:undefined);
    ingrText=text.slice(0,stepsIdx);
  }else{
    // No labelled sections — heuristic: find first clearly step-like line and treat everything before it as ingredients
    const stepStartRx=/\b(?:preheat|heat (?:the|a|your|oven)|add (?:the|to|all)|mix (?:the|together|until|well)|stir (?:in|together|until)|combine (?:the|all)|cook (?:for|the|until|over)|bake (?:for|at|until)|roast|grill|fry|boil|simmer|sauté|saute|pour|place (?:the|in|on)|put (?:the|in|on)|cover (?:and|with)|remove (?:the|from)|transfer|fold in|whisk|knead|chop|dice|slice|mince|season (?:with|to)|serve|let cool|drain|brush|spread|sprinkle|beat (?:the|until)|blend|bring to|reduce|toss|brown|sear)\b/i;
    const numberedStepRx=/^\d+[.\)]\s+[A-Z]/;
    const metaLineRx=/^(?:prep|cook|total|yield|serves?|servings?|difficulty|author|source|by |from |via |makes?|time:|course:|cuisine:)/i;
    const allLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
    let firstStepIdx=-1;
    for(let i=0;i<allLines.length;i++){
      const l=allLines[i];
      if((stepStartRx.test(l)&&l.length>35)||numberedStepRx.test(l)){firstStepIdx=i;break;}
    }
    if(firstStepIdx>0){
      // Filter out metadata lines from the pre-step block to get cleaner ingredients

    const[,a,u]=m;candidates.push({mins:toMins(a,null,u),pri:2,pos:m.index});}

  while((m=RANGE_RX.exec(text))!==null){
    const[,a,b,u]=m;candidates.push({mins:toMins(a,b,u),pri:1,pos:m.index});}

async function tryFetch(url){

      const r=await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`allorigins ${r.status}`);
      const d=await r.json();
      if(!d.contents||d.contents.length<300)throw new Error('Empty allorigins response');
      return d.contents;
    },
    // codetabs — returns raw HTML
    async()=>{
      const r=await fetch(`https://api.codetabs.com/v1/proxy/?quest=${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`codetabs ${r.status}`);
      const t=await r.text();
      if(t.length<300||t.includes('"Error"'))throw new Error('Empty codetabs response');
      return t;
    },
    // corsproxy.io — returns raw HTML
    async()=>{
      const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`corsproxy ${r.status}`);
      const t=await r.text();
      if(t.length<300)throw new Error('Empty corsproxy response');
      return t;

    // thingproxy — returns raw HTML

      const r=await fetch(`https://thingproxy.freeboard.io/fetch/${url}`,{signal:AbortSignal.timeout(12000)});

      const t=await r.text();
      if(t.length<300)throw new Error('Empty thingproxy response');

    state.addForm.urlError=err.message||'Something went wrong.';
  }
  // Jump to combined preview on success/partial; stay in add page on error
  const s=state.addForm.urlStatus;
  if((s==='success'||s==='partial')&&state.addForm.urlParsed){
    if(s==='partial')showToast('Recipe extracted — please review the steps carefully',3500);
    jumpToPreview('url');
  }else{
    renderAdd();
  }
}

// ═══════════════════════════════════════
//  CALORIE CALCULATION  (USDA + Groq fallback)
// ═══════════════════════════════════════
// Step 1: Ask Groq to parse every ingredient into {item, grams} for the full recipe batch.
// Groq handles unit conversions ("1 cup flour" → 120g, "3 cloves garlic" → 9g, etc.)
async function parseIngredientsToGrams(ingredients){
  const allItems=(ingredients||[]).flatMap(s=>s.items||[]);
  if(!allItems.length)return[];
  const prompt=`Convert each recipe ingredient to its estimated weight in grams for the ENTIRE recipe batch (not per serving).
Return ONLY a JSON array, nothing else:
[{"item":"all-purpose flour","grams":240},{"item":"olive oil","grams":28}]
Rules:
- Use standard densities: 1 cup flour≈120g, 1 cup sugar≈200g, 1 cup butter≈227g, 1 cup water/milk≈240g, 1 tbsp oil≈14g, 1 tbsp butter≈14g, 1 tsp≈5g, 1 tbsp≈15g
- Whole items: 1 large egg≈50g, 1 clove garlic≈3g, 1 medium onion≈150g, 1 lemon≈100g, 1 can (15oz)≈425g
- Use simple USDA-searchable names: "all-purpose flour" not "plain flour", "whole milk" not "full-fat milk", "unsalted butter" not "butter"
- Include every ingredient even if calories are minimal
- If a quantity is a range (e.g. "2–3 tbsp"), use the midpoint
Ingredients:
${allItems.join('\n')}`;
  try{
    const data=await callGroq([],prompt);
    const raw=data.choices?.[0]?.message?.content||'';
    const result=parseGroqJSON(raw);
    return Array.isArray(result)?result:[];
  }catch(e){return[];}
}
// Step 3: Full pipeline — parse → Worker USDA lookup → Groq fallback → per-serving total.
// Returns {calories: "320", source: "usda"|"mixed"|"ai"} or null on failure.
async function calculateCalories(p){
  const servings=parseFloat((p.yield||'').match(/[\d.]+/)?.[0]||'0')||1;

  // Step 1: Groq converts all ingredients to {item, grams}
  const parsed=await parseIngredientsToGrams(p.ingredients);
  if(!parsed.length)return null;

  // Step 2: Single batched call to Worker — uses USDA_API_KEY stored in Cloudflare
  const ingredientStrings=parsed.map(({item,grams})=>`${grams}g ${item}`);
  try{
    const resp=await fetch(`${GROQ_PROXY}/nutrition`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ingredients:ingredientStrings,servings})
    });
    if(resp.ok){
      const data=await resp.json();
      if(data.caloriesPerServing){
        const results=data.results||[];
        const hits=results.filter(r=>r.caloriesPer100g!==null).length;
        const source=hits>=results.length*0.6?'usda':'mixed';
        return{calories:String(data.caloriesPerServing),source};
      }
    }
  }catch(e){console.warn('Worker nutrition call failed:',e);}

  // Fallback: Groq estimates if Worker call fails
  try{
    const fbPrompt=`Estimate calories per serving for this recipe.
Recipe: ${p.name}
Yield: ${p.yield}
Ingredients: ${parsed.map(({item,grams})=>`${grams}g ${item}`).join(', ')}
Return ONLY a single integer — estimated calories per serving. No explanation.`;
    const data=await callGroq([],fbPrompt);
    const raw=(data.choices?.[0]?.message?.content||'').trim();
    const cal=parseInt(raw.replace(/[^\d]/g,''));
    if(!isNaN(cal)&&cal>0)return{calories:String(cal),source:'ai'};
  }catch(e){}
  return null;
}

// Auto-fill missing metadata fields — runs once when preview opens.
// Fires two parallel tasks:
//   1. Quick Groq call for course/cuisine/times
//   2. USDA+Groq calorie pipeline (more accurate, takes longer)
async function estimateMissingMeta(p){
  const missingMeta=!p.course||!p.cuisine||!p.prepTime;
  const missingCal=!p.calories;
  if((!missingMeta&&!missingCal)||p._metaEstimated)return;
  p._metaEstimated=true;
  // ── Task 1: Quick fields (course, cuisine, times) ──────────────────────────
  const metaTask=missingMeta?(async()=>{
    try{
      const ingrList=(p.ingredients||[]).flatMap(s=>s.items||[]).slice(0,20).join(', ');
      const stepSnippet=(p.steps||[]).slice(0,3).map(s=>s.instructions).join(' ').substring(0,600);
      const missingFields=[!p.course&&'course',!p.cuisine&&'cuisine',!p.prepTime&&'prepTime',!p.cookTime&&'cookTime',!p.totalTime&&'totalTime'].filter(Boolean);
      const prompt=`Given this recipe, fill in ONLY the missing fields. Return ONLY JSON, no markdown:
{"course":"Dinner","cuisine":"American","prepTime":"15 min","cookTime":"30 min","totalTime":"45 min"}
Recipe name: ${p.name}
Ingredients (sample): ${ingrList}
Steps (sample): ${stepSnippet}
Rules:
- course: one of Breakfast, Brunch, Lunch, Dinner, Dessert, Snack, Appetizer, Side Dish, Soup, Salad
- cuisine: e.g. American, Italian, Mexican, Asian, Mediterranean — infer from the recipe
- prepTime/cookTime/totalTime: estimate from steps, format as "X min" or "X hr Y min"
- Only provide these fields: ${missingFields.join(', ')}`;
      const data=await callGroq([],prompt);
      const raw=data.choices?.[0]?.message?.content||'';
      const est=parseGroqJSON(raw);
      if(!est)return;
      if(!p.course&&est.course)p.course=est.course;
      if(!p.cuisine&&est.cuisine)p.cuisine=est.cuisine;
      if(!p.prepTime&&est.prepTime)p.prepTime=est.prepTime;
      if(!p.cookTime&&est.cookTime)p.cookTime=est.cookTime;
      if(!p.totalTime&&est.totalTime)p.totalTime=est.totalTime;
    }catch(e){}
  })():Promise.resolve();
  // ── Task 2: USDA + Groq calorie pipeline ──────────────────────────────────
  const calTask=missingCal?(async()=>{
    try{
      const result=await calculateCalories(p);
      if(result&&result.calories){
        p.calories=result.calories;
        p._caloriesEstimated=true;
        p._caloriesSource=result.source; // 'usda' | 'mixed' | 'ai'
      }
    }catch(e){}
  })():Promise.resolve();
  // Run both in parallel; re-render once each finishes so fields appear progressively
  metaTask.then(()=>{if(state.view==='preview')renderPreview();});
  calTask.then(()=>{if(state.view==='preview')renderPreview();});
  await Promise.allSettled([metaTask,calTask]);
}
// Recalculate calories/serving when user changes the serving count in the preview form.
// totalCal is the original total calories (calories × original servings) baked into the field.
function updatePreviewCal(yieldVal,totalCal){
  if(!totalCal)return;
  const m=(yieldVal||'').match(/[\d.]+/);
  if(!m)return;
  const n=parseFloat(m[0]);
  if(n>0){
    const el=document.getElementById('pv-calories');
    if(el)el.value=String(Math.round(totalCal/n));
  }
}
function renderPreview(){
  const p=state.previewData;
  if(!p){go('add');return;}
  estimateMissingMeta(p);
  const allIngr=(p.ingredients||[]).flatMap(s=>s.items||[]);
  const sectionCount=(p.ingredients||[]).filter(s=>s.items&&s.items.length).length;
  const ingrHTML=(p.ingredients||[]).map(sec=>{
