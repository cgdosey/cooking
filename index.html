<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Recipe Ripper</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recipe Ripper">
  <meta name="theme-color" content="#D4705A">
  <script>
  // Generate app icon — spatula & whisk crossed on terracotta background
  (function(){
    try{
      const c=document.createElement('canvas');
      c.width=512;c.height=512;
      const ctx=c.getContext('2d');
      const W=512,H=512;

      // ── Background ──
      const bg=ctx.createLinearGradient(0,0,W,H);
      bg.addColorStop(0,'#D4705A');bg.addColorStop(1,'#B85A46');
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.roundRect(0,0,W,H,100);ctx.fill();

      // Single spatula, centred horizontally, rising from below the bottom edge
      const cx=W/2;
      const WC='rgba(255,255,255,0.97)';
      ctx.lineCap='round';ctx.lineJoin='round';

      // Handle — starts past the bottom edge so it looks like it's coming out of the icon
      ctx.strokeStyle=WC;ctx.lineWidth=26;
      ctx.beginPath();ctx.moveTo(cx,530);ctx.lineTo(cx,308);ctx.stroke();

      // Neck / collar
      ctx.strokeStyle=WC;ctx.lineWidth=34;
      ctx.beginPath();ctx.moveTo(cx,308);ctx.lineTo(cx,262);ctx.stroke();

      // Paddle
      const pW=96,pY=62,pH=192;
      ctx.fillStyle=WC;
      ctx.beginPath();ctx.roundRect(cx-pW/2,pY,pW,pH,13);ctx.fill();

      // Slots — 3, centred in paddle width
      ctx.fillStyle='#9E4035';
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.roundRect(cx-34+i*26,pY+14,16,pH-28,6);ctx.fill();
      }

      // Set as apple-touch-icon and favicon
      const link=document.createElement('link');
      link.rel='apple-touch-icon';link.href=c.toDataURL('image/png');
      document.head.appendChild(link);
      const fav=document.createElement('link');
      fav.rel='icon';fav.type='image/png';fav.href=c.toDataURL('image/png');
      document.head.appendChild(fav);
    }catch(e){}
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --terra:    #D4705A;
      --terra-dk: #B85A46;
      --terra-bg: #FDF1EE;
      --terra-lt: #F5C5BB;
      --bg:       #FFFFFF;
      --bg-2:     #F8F6F4;
      --border:   #EEE9E6;
      --text:     #1A1514;
      --text-2:   #6B6260;
      --text-3:   #B0A8A4;
      --success:  #2A9D5C;
      --danger:   #D64045;
      --nav-h:    64px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    a,button,input,select,textarea,[role="button"]{touch-action:manipulation;}
    html,body{
      height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    /* ── BOTTOM NAV ── */
    .bnav{
      position:fixed;bottom:0;left:0;right:0;z-index:300;
      height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
      padding-bottom:env(safe-area-inset-bottom,0px);
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      display:flex;
    }
    .bnav-tab{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;border:none;background:none;cursor:pointer;
      font-family:inherit;color:var(--text-3);transition:color .18s;
      -webkit-tap-highlight-color:transparent;
    }
    .bnav-tab.active{color:var(--terra);}
    .bnav-tab svg{width:22px;height:22px;}
    .bnav-tab span{font-size:.65rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
    /* ── SHELL ── */
    .shell{min-height:100dvh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));}
    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:200;
      padding:max(16px,env(safe-area-inset-top)) 18px 12px;
      background:rgba(255,255,255,.93);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    }
    .topbar-row{display:flex;align-items:center;justify-content:space-between;}
    .topbar-title{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;}
    /* ── SEARCH WRAP ── */
    .search-wrap{position:relative;}
    .search-box{
      width:100%;height:40px;border-radius:10px;
      font-size:16px;
      direction:ltr;unicode-bidi:plaintext;
    }
    /* Force LTR on all text inputs regardless of locale */
    input,textarea,select{direction:ltr;unicode-bidi:plaintext;}
    /* ── ICON BUTTON ── */
    .ibtn{
      width:40px;height:40px;border-radius:50%;border:none;background:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:var(--text-2);-webkit-tap-highlight-color:transparent;transition:background .15s;
    }
    .ibtn:hover{background:var(--bg-2);}
    .ibtn svg{width:20px;height:20px;}
    /* ── BUTTONS ── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      height:50px;border-radius:12px;padding:0 20px;
      font-family:inherit;font-size:.9rem;font-weight:700;border:none;cursor:pointer;
      -webkit-tap-highlight-color:transparent;transition:opacity .15s,transform .1s;
    }
    .btn:active{transform:scale(.97);}
    .btn svg{width:18px;height:18px;}
    .btn-terra{background:var(--terra);color:#fff;}
    .btn-terra:hover{background:var(--terra-dk);}
    .btn-outline{background:none;color:var(--terra);border:1.5px solid var(--terra);}
    .btn-outline:hover{background:var(--terra-bg);}
    .btn-ghost{background:none;color:var(--text-2);border:1.5px solid var(--border);}
    .btn-ghost:hover{background:var(--bg-2);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-danger:hover{background:#b83438;}
    .btn-full{width:100%;}
    .btn-lg{height:54px;font-size:.95rem;border-radius:14px;}
    /* ── RECIPE CARDS ── */
    .card-list{padding:16px 16px 0;display:flex;flex-direction:column;gap:14px;}
    .recipe-card{
      background:var(--bg);border-radius:18px;overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.07);
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:transform .15s;
    }
    .recipe-card:active{transform:scale(.985);}
    .rc-img{width:100%;height:190px;object-fit:cover;display:block;background:var(--terra-bg);}
    .rc-img-ph{
      width:100%;height:190px;
      background:linear-gradient(135deg,#F5EDE8,#EBD8D1);
      display:flex;align-items:center;justify-content:center;
      font-size:4.5rem;font-weight:800;color:rgba(212,112,90,.18);letter-spacing:-2px;
    }
    .rc-body{padding:14px 16px 16px;}
    .rc-name{font-size:1.05rem;font-weight:700;margin-bottom:5px;letter-spacing:-.2px;}
    .rc-meta{display:flex;align-items:center;gap:5px;color:var(--text-3);font-size:.82rem;}
    .rc-meta svg{width:13px;height:13px;flex-shrink:0;}
    /* ── DETAIL ── */
    .detail-img{width:100%;height:240px;object-fit:cover;display:block;background:var(--terra-bg);}
    .detail-img-ph{
      width:100%;height:240px;
      background:linear-gradient(135deg,#F5EDE8,#EBD8D1);
      display:flex;align-items:center;justify-content:center;
      font-size:6rem;font-weight:800;color:rgba(212,112,90,.15);
    }
    .detail-hdr{padding:16px 18px 0;}
    .detail-name{font-size:1.45rem;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;}
    .detail-meta{display:flex;align-items:center;gap:6px;color:var(--text-3);font-size:.84rem;}
    .detail-meta svg{width:14px;height:14px;flex-shrink:0;}
    /* sub-tabs */
    .sub-tabs{display:flex;gap:0;padding:0 18px;border-bottom:1px solid var(--border);margin-top:14px;}
    .sub-tab{
      padding:10px 0 11px;margin-right:24px;
      border:none;border-bottom:2.5px solid transparent;margin-bottom:-1px;
      background:none;font-family:inherit;font-size:.88rem;font-weight:600;
      color:var(--text-3);cursor:pointer;transition:color .18s,border-color .18s;
    }
    .sub-tab.active{color:var(--terra);border-bottom-color:var(--terra);}
    /* ingredients */
    .tab-content{padding:4px 18px 4px;}
    .ingr-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:11px 0;border-bottom:1px solid var(--border);
    }
    .ingr-row:last-child{border-bottom:none;}
    .ingr-name{font-size:.9rem;color:var(--text-2);flex:1;}
    .ingr-qty{display:none;}
    /* cookware */
    .cw-item{
      display:flex;align-items:center;gap:12px;
      padding:11px 0;border-bottom:1px solid var(--border);
      font-size:.9rem;color:var(--text-2);
    }
    .cw-item:last-child{border-bottom:none;}
    .cw-dot{width:6px;height:6px;border-radius:50%;background:var(--terra);flex-shrink:0;}
    /* steps overview */
    .sov-row{
      display:flex;gap:12px;align-items:flex-start;
      padding:11px 0;border-bottom:1px solid var(--border);
    }
    .sov-row:last-child{border-bottom:none;}
    .sov-num{
      width:26px;height:26px;border-radius:50%;
      background:var(--bg-2);color:var(--text-3);
      font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .sov-title{font-size:.88rem;font-weight:600;margin-bottom:2px;}
    .sov-timer{font-size:.76rem;color:var(--text-3);}
    /* full recipe view */
    .full-phase-hdr{
      display:flex;align-items:center;gap:8px;
      padding:18px 0 6px;font-size:.72rem;font-weight:700;
      text-transform:uppercase;letter-spacing:.6px;
    }
    .full-phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .full-step{
      padding:14px 0;border-bottom:1px solid var(--border);
    }
    .full-step:last-child{border-bottom:none;}
    .full-step-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;}
    .full-step-num{
      width:24px;height:24px;border-radius:50%;flex-shrink:0;
      font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;
      background:var(--bg-2);color:var(--text-3);
    }
    .full-step-title{font-size:.92rem;font-weight:700;line-height:1.3;flex:1;}
    .full-step-body{font-size:.88rem;line-height:1.7;color:var(--text-2);padding-left:34px;}
    .full-step-timer{font-size:.76rem;color:var(--terra);font-weight:600;padding-left:34px;margin-top:4px;}
    .full-ingr-sec{padding:10px 0 2px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);}
    .full-ingr-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.9rem;}
    .full-ingr-row:last-child{border-bottom:none;}
    /* CTA row */
    .detail-cta{padding:12px 18px 16px;display:flex;flex-direction:column;gap:10px;}
    /* ── GUIDED ── */
    .guided-shell{background:#fff;min-height:100dvh;}
    .guided-top{
      padding:max(16px,env(safe-area-inset-top)) 16px 12px;
      display:flex;align-items:center;position:relative;
    }
    .guided-label{
      position:absolute;left:0;right:0;text-align:center;
      font-size:.76rem;font-weight:700;letter-spacing:1.2px;
      text-transform:uppercase;color:var(--text-2);pointer-events:none;
    }
    .guided-prog{height:2px;background:var(--border);margin:0 18px;}
    .guided-prog-fill{height:100%;background:var(--terra);transition:width .35s ease;border-radius:99px;}
    .guided-body{padding:24px 20px;padding-bottom:100px;}
    .guided-phase{
      display:inline-flex;align-items:center;gap:6px;
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;
    }
    .guided-phase-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .guided-title{font-size:1.4rem;font-weight:800;line-height:1.25;letter-spacing:-.4px;margin-bottom:14px;}
    .guided-instructions{font-size:1.15rem;line-height:1.8;color:var(--text);}
    .guided-tip{
      margin-top:14px;padding:12px 14px;
      background:var(--terra-bg);border-radius:10px;
      font-size:.84rem;color:#7C3015;line-height:1.6;
    }
    .guided-tip-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--terra);margin-bottom:3px;}
    .step-img{
      width:calc(100% + 36px);margin-left:-18px;
      height:220px;object-fit:cover;display:block;margin-top:20px;
    }
    /* timer in step */
    .step-timer-wrap{margin:24px 0 8px;display:flex;flex-direction:column;align-items:center;gap:14px;}
    .t-ring-wrap{position:relative;width:160px;height:160px;}
    .t-ring-wrap svg{width:100%;height:100%;}
    .t-overlay{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .t-time{font-size:2rem;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1;}
    .t-time.done{color:var(--success);}
    .t-sub{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-top:2px;}
    .t-label{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);}
    .t-btns{display:flex;gap:10px;}
    /* round floating nav */
    .guided-footer{
      position:fixed;bottom:0;left:0;right:0;
      padding:12px 20px;
      padding-bottom:max(18px,calc(env(safe-area-inset-bottom,0px) + 12px));
      display:flex;align-items:center;justify-content:flex-end;gap:10px;
      pointer-events:none;
    }
    .guided-footer-left{margin-right:auto;}
    .rbtn{
      width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:transform .12s,opacity .15s;
      pointer-events:all;
      box-shadow:0 4px 18px rgba(0,0,0,.18);
    }
    .rbtn:active{transform:scale(.91);}
    .rbtn svg{width:20px;height:20px;}
    .rbtn-terra{background:var(--terra);color:#fff;}
    .rbtn-white{background:#fff;color:var(--text-2);}
    .rbtn:disabled{opacity:.3;cursor:not-allowed;}
    /* ── SHOPPING LIST ── */
    .shop-hdr{
      padding:max(16px,env(safe-area-inset-top)) 18px 0;
    }
    .shop-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .shop-title{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;}
    .shop-subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 18px;}
    .shop-stab{
      padding:10px 0 11px;margin-right:20px;margin-bottom:-1px;
      border:none;border-bottom:2.5px solid transparent;
      background:none;font-family:inherit;font-size:.88rem;font-weight:600;
      color:var(--text-3);cursor:pointer;transition:color .18s,border-color .18s;
    }
    .shop-stab.active{color:var(--terra);border-bottom-color:var(--terra);}
    .shop-body{padding:0 18px;}
    .shop-cat-name{
      font-size:.76rem;font-weight:700;text-transform:lowercase;
      color:var(--terra);margin:20px 0 6px;letter-spacing:.3px;
    }
    .shop-item{
      display:flex;align-items:center;gap:12px;
      padding:9px 0;border-bottom:1px solid var(--border);
    }
    .shop-item:last-child{border-bottom:none;}
    .shop-cb{
      width:22px;height:22px;border-radius:50%;border:2px solid var(--text-3);
      background:none;flex-shrink:0;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;transition:background .15s,border-color .15s;
    }
    .shop-cb.on{background:var(--terra);border-color:var(--terra);}
    .shop-cb svg{width:11px;height:11px;color:#fff;}
    .shop-item-name{flex:1;font-size:.9rem;color:var(--text);transition:color .2s;}
    .shop-item-name.on{color:var(--text-3);text-decoration:line-through;}
    .shop-item-qty{font-size:.82rem;color:var(--text-3);font-weight:500;}
    .shop-rcp-name{
      font-size:.82rem;font-weight:700;color:var(--text);
      margin:20px 0 8px;display:flex;align-items:center;gap:10px;
    }
    .shop-rcp-remove{
      font-size:.72rem;font-weight:600;color:var(--text-3);
      background:none;border:1px solid var(--border);border-radius:99px;
      padding:3px 9px;cursor:pointer;transition:color .15s,border-color .15s;
    }
    .shop-rcp-remove:hover{color:var(--danger);border-color:var(--danger);}
    .shop-empty{text-align:center;padding:64px 20px;}
    .shop-empty-icon{width:56px;height:56px;margin:0 auto 14px;opacity:.3;}
    .shop-empty-icon svg{width:100%;height:100%;}
    .shop-empty h3{font-size:1rem;font-weight:700;color:var(--text-2);margin-bottom:6px;}
    .shop-empty p{font-size:.84rem;color:var(--text-3);}
    .shop-clear-row{padding:12px 18px;display:flex;justify-content:flex-end;}
    /* ── TIMER TAB ── */
    .timer-page{padding:0 18px;}
    .timer-section-label{
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
      color:var(--text-3);margin:20px 0 12px;
    }
    .quick-timer-card{
      background:var(--bg-2);border-radius:18px;padding:22px;margin-bottom:16px;
    }
    .qt-display{text-align:center;margin-bottom:18px;}
    .qt-time{font-size:4rem;font-weight:800;letter-spacing:-3px;font-variant-numeric:tabular-nums;line-height:1;}
    .qt-time.done{color:var(--success);}
    .qt-sub{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-top:4px;}
    .qt-presets{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
    .preset-btn{
      padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);
      background:var(--bg);font-family:inherit;font-size:.82rem;font-weight:600;
      color:var(--text-2);cursor:pointer;transition:all .15s;
    }
    .preset-btn:hover,.preset-btn.on{background:var(--terra);color:#fff;border-color:var(--terra);}
    .qt-btns{display:flex;gap:10px;justify-content:center;}
    .active-timer-banner{
      background:var(--terra-bg);border-radius:14px;padding:16px 18px;
      margin-bottom:12px;display:flex;align-items:center;gap:14px;
    }
    .atb-info{flex:1;}
    .atb-name{font-weight:700;font-size:.9rem;margin-bottom:2px;}
    .atb-time{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;color:var(--terra);font-variant-numeric:tabular-nums;}
    .atb-resume-btn{
      background:var(--terra);color:#fff;border:none;border-radius:99px;
      padding:8px 16px;font-family:inherit;font-size:.82rem;font-weight:700;
      cursor:pointer;
    }
    /* persist badge */
    .persist-note{
      font-size:.76rem;color:var(--text-3);text-align:center;
      padding:12px 18px;display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .persist-note svg{width:14px;height:14px;flex-shrink:0;}
    /* ── BACK-TO-RECIPE BANNER ── */
    .back-recipe-bar{
      display:flex;align-items:center;gap:10px;
      padding:10px 18px;background:var(--terra-bg);border-bottom:1px solid var(--terra-lt);
    }
    .back-recipe-btn{
      display:flex;align-items:center;gap:6px;
      background:var(--terra);color:#fff;border:none;border-radius:20px;
      padding:7px 14px 7px 10px;font-size:.82rem;font-weight:700;cursor:pointer;
      font-family:inherit;white-space:nowrap;
    }
    .back-recipe-btn svg{width:16px;height:16px;flex-shrink:0;}
    /* ── CONFIRM SHEET ── */
    .confirm-backdrop{
      position:fixed;inset:0;z-index:900;
      background:rgba(0,0,0,.45);
      display:flex;align-items:flex-end;justify-content:center;
      animation:fadeIn .18s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .confirm-sheet{
      width:100%;max-width:480px;
      background:#fff;border-radius:20px 20px 0 0;
      padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));
      animation:slideUp .22s ease;
    }
    @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
    .confirm-title{font-size:1.1rem;font-weight:800;margin-bottom:6px;}
    .confirm-msg{font-size:.9rem;color:var(--text-2);line-height:1.5;margin-bottom:22px;}
    .confirm-btns{display:flex;flex-direction:column;gap:10px;}
    /* ── ADD RECIPE ── */
    .add-page{padding:0 18px 32px;}
    .add-tabs{

const PHASES={
  'Prep':'#0891B2','Marinating':'#7C3AED','Mixing':'#0369A1',
  'Sautéing':'#B45309','Simmering':'#CA8A04','Roasting':'#B91C1C',
  'Baking':'#DC2626','Grilling':'#9A3412','Frying':'#C2410C',
  'Steaming':'#0284C7','Resting':'#57534E','Assembly':'#15803D',
  'Finishing':'#166534','Cooling':'#0369A1',
  'Levain':'#7C3AED','Autolyse':'#6D28D9',
  'Bulk Fermentation':'#B45309','Shaping':'#854D0E','Proofing':'#4338CA',
};
const PHASE_KEYS=Object.keys(PHASES);
function pc(p){
  if(!p)return'#78716C';
  if(PHASES[p])return PHASES[p];
  // Fuzzy color match for raw section names (keyword-only, never changes the label)
  const nl=p.toLowerCase();
  for(const [k,v] of Object.entries(PHASES)){if(nl.includes(k.toLowerCase())||k.toLowerCase().includes(nl))return v;}
  if(/levain|starter|leaven/i.test(p))return'#7C3AED';
  if(/autolyse|autolyze/i.test(p))return'#6D28D9';
  if(/bulk|ferment/i.test(p))return'#B45309';
  if(/shap/i.test(p))return'#854D0E';
  if(/proof|retard/i.test(p))return'#4338CA';
  if(/bak/i.test(p))return'#DC2626';
  if(/roast/i.test(p))return'#B91C1C';
  if(/grill/i.test(p))return'#9A3412';
  if(/fry/i.test(p))return'#C2410C';
  if(/simmer/i.test(p))return'#CA8A04';
  if(/marinate/i.test(p))return'#7C3AED';
  if(/assembl/i.test(p))return'#15803D';
  if(/finish|garnish/i.test(p))return'#166534';
  if(/cool|rest|stand/i.test(p))return'#57534E';
  if(/mix|combin/i.test(p))return'#0369A1';
  if(/saut[eé]|soften/i.test(p))return'#B45309';
  if(/steam/i.test(p))return'#0284C7';
  if(/prep|mise/i.test(p))return'#0891B2';
  // Deterministic fallback color from name
  const pal=['#0891B2','#7C3AED','#15803D','#B45309','#9A3412','#4338CA','#CA8A04','#0369A1'];
  return pal[p.charCodeAt(0)%pal.length];
}
// Summarize an instruction into a short action title
function summarizeStepTitle(text){
  if(!text)return'';
  text=text.replace(/^step\s*\d+[:\.\-]?\s*/i,'').trim();
  // Find the first imperative cooking verb and build a short phrase around it
  const verbRx=/\b(add|mix|stir|combine|heat|cook|bake|roast|grill|fry|boil|simmer|sauté|saute|pour|place|put|cover|remove|transfer|fold|whisk|knead|chop|dice|slice|mince|preheat|season|serve|cool|refrigerate|drain|rinse|brush|spread|sprinkle|beat|blend|bring|reduce|toss|coat|marinate|brown|sear|fluff|shred|press|roll|shape|proof|rest|dust|divide|flip|stretch|pinch|seal|score|prepare|use|do|make|turn|repeat|continue|let|allow|set aside|deglaze|rest|incorporate|dimple|slap|fold|rise)\b/i;
  const m=text.match(verbRx);
  if(m){
    // Take from the verb forward, trim at a natural break
    let phrase=text.slice(m.index);
    // Cut at "and then", "until it", "so that", secondary clause starters
    phrase=phrase.replace(/\s+(?:and then|once it|until it|so that|which will|you will|this will|it will|at this point)\b.*/i,'');
    // Cut at end of first sentence
    phrase=phrase.split(/[.!?]/)[0];
    // Trim to 60 chars at word boundary
    if(phrase.length>60){phrase=phrase.substring(0,57).replace(/\s+\S*$/,'')+'…';}
    return phrase.trim();
  }
  // Fallback: first clause before comma or semicolon, capped at 60
  let fallback=text.split(/[.!?,;]/)[0].trim();
  if(fallback.length>60)fallback=fallback.substring(0,57).replace(/\s+\S*$/,'')+'…';
  return fallback;
}

function fmtTime(s){
  if(s<=0)return'0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`;
}
function hoText(r){
  const m=r.steps.reduce((a,s)=>a+(s.timerMinutes||0),0);
  if(!m)return null;
  const h=Math.floor(m/60),mn=m%60;
  return h&&mn?`${h}h ${mn}m`:h?`${h}h`:`${mn}m`;
}
function escH(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function getRecipe(){return recipes.find(r=>r.id===state.activeRecipeId)||null;}

function parseIngredient(text){
  const m=text.match(/^((?:[\d¼½¾⅓⅔\/\.\-]+\s*)+(?:g|kg|ml|l|oz|lb|lbs|tsp|tbsp|cup|cups|clove|cloves|bunch|small|medium|large|pinch|handful|can|tin|pack|slice|slices|piece|pieces|sprig|sprigs|head|pod|pods?)?\s*)/i);
  if(m&&m[1].trim())return{qty:m[1].trim(),name:text.slice(m[1].length).trim()};
  return{qty:'',name:text};
}
function categorize(text){
  const t=text.toLowerCase();
  if(/flour|yeast|baking powder|baking soda|sourdough|starter|whole wheat|cocoa|chocolate/.test(t))return'baking';
  if(/milk|cream|butter|egg|cheese|yogurt|parmesan|mozzarella|cheddar|ricotta|gouda|feta/.test(t))return'dairy & eggs';
  if(/chicken|beef|pork|lamb|salmon|tuna|shrimp|prawn|fish|bacon|sausage|turkey|duck|mince|ground meat/.test(t))return'meat & fish';
  if(/pepper|cumin|coriander|paprika|turmeric|cinnamon|nutmeg|cardamom|clove|star anise|bay leaf|oregano|thyme|rosemary|basil|dill|mint|parsley|cilantro|sage|chive|herb|spice|seasoning|saffron|cayenne|chili|chilli/.test(t))return'herbs & spices';
  if(/garlic|onion|carrot|celery|tomato|potato|lemon|lime|ginger|scallion|shallot|leek|zucchini|mushroom|spinach|lettuce|cucumber|avocado|apple|pear|berry|fruit|broccoli|cauliflower|eggplant|capsicum|asparagus|pumpkin|squash|corn|spring onion/.test(t))return'produce';
  if(/salt|oil|vinegar|sauce|paste|broth|stock|canned|honey|syrup|vanilla|rice|pasta|noodle|lentil|bean|oat|sugar|soy|coconut|wine/.test(t))return'pantry';
  return'other';
}

  const r=recipes.find(r=>r.id===recipeId);if(!r)return;
  shoppingList=shoppingList.filter(i=>i.recipeId!==recipeId);
  (r.ingredients||[]).forEach(sec=>{
    (sec.items||[]).forEach(item=>{

      shoppingList.push({id:Date.now()+Math.random(),name:name||item,qty,category:categorize(name||item),checked:false,recipeId,recipeName:r.name});

let _actx=null;
function getACtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function beep(freq,dur){
  try{const ctx=getACtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.value=freq;osc.type='sine';
    g.gain.setValueAtTime(0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playDone(){[0,500,1000].forEach(d=>setTimeout(()=>beep(880,.4),d));setTimeout(()=>beep(1100,.6),1700);}

// ═══════════════════════════════════════
//  GUIDED TIMER ENGINE  (endTime-based for persistence)
// ═══════════════════════════════════════
const CIRC=2*Math.PI*52;
function timerOffset(t){return CIRC*(t.total?1-t.remaining/t.total:0);}

function startTimer(totalSec,label){
  stopTimer();
  const endTime=Date.now()+(totalSec*1000);
  state.timer={remaining:totalSec,total:totalSec,running:true,done:false,_id:null,endTime,label};
  save('k_timer',{endTime,totalSec,label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
  state.timer._id=setInterval(tickTimer,250);
  askNotifPerm();
}
function tickTimer(){
  const t=state.timer;if(!t.running)return;
  const remaining=Math.max(0,Math.ceil((t.endTime-Date.now())/1000));
  t.remaining=remaining;
  if(remaining<=0){
    t.remaining=0;t.running=false;t.done=true;
    clearInterval(t._id);t._id=null;
    localStorage.removeItem('k_timer');
    playDone();
    sendNotif('Timer complete!',t.label||'Your timer is done.');
  }
  patchTimer();
}
function pauseTimer(){
  clearInterval(state.timer._id);state.timer._id=null;state.timer.running=false;
  save('k_timer',{endTime:state.timer.endTime,totalSec:state.timer.total,label:state.timer.label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
  patchTimer();
}
function resumeTimer(){
  if(state.timer.done)return;
  // Recalculate endTime from remaining
  state.timer.endTime=Date.now()+(state.timer.remaining*1000);
  state.timer.running=true;
  state.timer._id=setInterval(tickTimer,250);
  save('k_timer',{endTime:state.timer.endTime,totalSec:state.timer.total,label:state.timer.label,stepIndex:state.stepIndex,recipeId:state.activeRecipeId});
}
function stopTimer(){
  clearInterval(state.timer._id);state.timer={...TIMER_ZERO};
  localStorage.removeItem('k_timer');
}
function skipTimer(){stopTimer();goNext();}

function applyCustomTimer(){

  const r=getRecipe();

  step.timerLabel=step.timerLabel&&step.timerLabel!==`${step.timerMinutes} min`?step.timerLabel:`${mins} min`;
  save('k_recipes',recipes);

  stopTimer();
  state.timer={...TIMER_ZERO,remaining:mins*60,total:mins*60,label:step.timerLabel};

// Restore timer when app opens or returns from background
function restoreTimer(){
  const stored=load('k_timer',null);
  if(!stored)return;
  const remaining=Math.max(0,Math.ceil((stored.endTime-Date.now())/1000));
  if(remaining<=0){
    localStorage.removeItem('k_timer');
    // If we're on the same step, mark done
    if(stored.recipeId===state.activeRecipeId&&stored.stepIndex===state.stepIndex){
      state.timer={...TIMER_ZERO,done:true,remaining:0,total:stored.totalSec,label:stored.label};
      playDone();
    }
    return;
  }
  state.timer={remaining,total:stored.totalSec,running:false,done:false,_id:null,endTime:stored.endTime,label:stored.label};
  if(stored.recipeId)state.activeRecipeId=stored.recipeId;
  if(stored.stepIndex!=null)state.stepIndex=stored.stepIndex;
}

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    // Returning from background — sync timer from endTime
    if(state.timer.endTime&&state.timer.running){
      const remaining=Math.max(0,Math.ceil((state.timer.endTime-Date.now())/1000));
      state.timer.remaining=remaining;
      if(remaining<=0){
        state.timer.remaining=0;state.timer.running=false;state.timer.done=true;
        clearInterval(state.timer._id);state.timer._id=null;
        localStorage.removeItem('k_timer');
        playDone();
        sendNotif('Timer complete!',state.timer.label||'Your timer is done.');
      }
      patchTimer();
    }
    // Also sync QT
    if(state.qt.endTime&&state.qt.running){
      const remaining=Math.max(0,Math.ceil((state.qt.endTime-Date.now())/1000));
      state.qt.remaining=remaining;
      if(remaining<=0){
        state.qt.remaining=0;state.qt.running=false;state.qt.done=true;
        clearInterval(state.qt._id);state.qt._id=null;
        playDone();sendNotif('Timer complete!','Your kitchen timer is done.');
      }
      patchQT();
    }
  }
});

function patchTimer(){
  const t=state.timer;
  const disp=document.getElementById('t-display');
  if(disp){disp.textContent=fmtTime(t.remaining);disp.className='t-time'+(t.done?' done':'');}
  const ring=document.getElementById('t-ring');
  if(ring)ring.setAttribute('stroke-dashoffset',timerOffset(t).toFixed(2));
  const ringc=document.getElementById('t-ringc');
  if(ringc)ringc.setAttribute('stroke',t.done?'#2A9D5C':'#D4705A');
  const sub=document.getElementById('t-sub');
  if(sub)sub.textContent=t.done?'done':'remaining';
  const ctrl=document.getElementById('t-ctrl');
  if(ctrl){ctrl.innerHTML=timerCtrlHTML();bindTimerBtns();}
  // Also update timer tab if visible
  patchTimerTab();
}
function timerCtrlHTML(){
  const t=state.timer;
  if(t.done)return`<button class="btn btn-terra" id="tb-cont">${I.fwd} Continue</button>`;
  if(!t.running&&t.remaining===t.total)
    return`<button class="btn btn-terra" id="tb-start">${I.play} Start Timer</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
  if(t.running)
    return`<button class="btn btn-ghost" id="tb-pause">${I.pause} Pause</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
  return`<button class="btn btn-terra" id="tb-resume">${I.play} Resume</button><button class="btn btn-ghost" id="tb-skip">${I.skip} Skip</button>`;
}
function bindTimerBtns(){
  const el=(id,fn)=>{const b=document.getElementById(id);if(b)b.onclick=fn;};
  el('tb-start',()=>{const r=getRecipe();if(r)startTimer(r.steps[state.stepIndex].timerMinutes*60,r.steps[state.stepIndex].timerLabel);});
  el('tb-pause',pauseTimer);el('tb-resume',resumeTimer);
  el('tb-skip',skipTimer);el('tb-cont',goNext);
}

function goTab(tab){
  // Remember recipe context when leaving the recipes tab
  if(tab!=='recipes'&&(state.view==='detail'||state.view==='full'||state.view==='guided')){
    state._prevRecipeId=state.activeRecipeId;
  } else if(tab==='recipes'){
    state._prevRecipeId=null;
  }
  state.tab=tab;
  if(tab!=='recipes'&&state.view==='guided')return;
  state.view='list';
  render();
}
function goBackToRecipe(){
  const id=state._prevRecipeId;
  state._prevRecipeId=null;
  go('detail',{id});
}
function go(view,opts={}){
  if(view!=='full')stopTimer();
  state.view=view;state.tab='recipes';
  if(opts.id!==undefined)state.activeRecipeId=opts.id;
  if(view==='guided'){state.stepIndex=0;state.timer={...TIMER_ZERO};}
  if(view==='detail')state.detailTab='ingredients';
  render();
}
function goNext(){
  const r=getRecipe();if(!r)return;
  stopTimer();
  if(state.stepIndex>=r.steps.length-1){state.view='complete';render();return;}
  state.stepIndex++;state.timer={...TIMER_ZERO};render();
}
function goPrev(){
  if(state.stepIndex<=0)return;
  stopTimer();state.stepIndex--;state.timer={...TIMER_ZERO};render();
}
function setDTab(t){state.detailTab=t;render();}
function setShopTab(t){state.shopTab=t;render();}
function setAddTab(t){state.addTab=t;render();}

let _tx=0,_ty=0;
function attachSwipe(){
  const c=document.getElementById('guided-body');if(!c)return;
  c.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
  c.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?goNext():goPrev();}
  },{passive:true});
}

  curry:['masala','tikka','korma','vindaloo','dal','lentil'],
};
function recipeBlob(r){
  return[
    r.name||'',
    r.description||'',
    (r.ingredients||[]).map(s=>(s.items||[]).join(' ')).join(' '),
    (r.steps||[]).map(s=>s.instructions||'').join(' '),
  ].join(' ').toLowerCase();
}
function recipeMatchesQuery(r,q){
  const words=q.toLowerCase().split(/\s+/).filter(Boolean);
  const blob=recipeBlob(r);
  return words.every(w=>{
    const terms=[w,...(SEARCH_RELATED[w]||[])];
    return terms.some(t=>blob.includes(t));
  });
}
function cardsHTML(q){
  const visible=q?recipes.filter(r=>recipeMatchesQuery(r,q)):recipes;
  return visible.length?visible.map(r=>{
    const ho=hoText(r);
    const img=r.image?`<img class="rc-img" src="${escH(r.image)}" alt="${escH(r.name)}" onerror="this.outerHTML='<div class=rc-img-ph>${escH(r.name.charAt(0))}</div>'">`:`<div class="rc-img-ph">${escH(r.name.charAt(0))}</div>`;
    return`<div class="recipe-card" onclick="go('detail',{id:${r.id}})">
      ${img}
      <div class="rc-body">
        <div class="rc-name">${escH(r.name)}</div>
        <div class="rc-meta">${I.clock} ${ho||r.totalTime||r.difficulty||''}${r.yield?` &nbsp;·&nbsp; ${escH(r.yield)}`:''}</div>
      </div>
    </div>`;
  }).join(''):(q?`<div class="empty"><div class="empty-icon">${I.utensils}</div><h3>No results</h3><p>No recipes match "${escH(q)}".</p></div>`:`<div class="empty"><div class="empty-icon">${I.utensils}</div><h3>No recipes yet</h3><p>Import from URL or add one manually.</p></div>`);
}
function setSearch(v){
  listSearch=v;
  // Update only the cards — never destroy/recreate the input element while typing
  const el=document.getElementById('recipe-cards');
  if(el){el.innerHTML=cardsHTML(v.trim());return;}
  renderList();
}

      </div>

function renderFull(){
  const r=getRecipe();if(!r){render();return;}
  const rid=r.id;
  const fromGuided=state._fullFrom==='guided';
  const backFn=fromGuided?'goFullBack()':'go(\'detail\',{id:'+rid+'})';

  // Group steps by phase, add global index
  const groups=[];
  (r.steps||[]).forEach((s,i)=>{
    const last=groups[groups.length-1];
    if(last&&last.phase===s.phase){last.steps.push({s,i});}
    else{groups.push({phase:s.phase,steps:[{s,i}]});}
  });

  // Build steps HTML
  const showHdrsFull=groups.length>1&&groups.some(g=>g.phase!=='');
  let stepsHTML='';
  groups.forEach(g=>{
    const color=pc(g.phase);
    if(showHdrsFull&&g.phase!==''){
      stepsHTML+=`<div class="full-phase-hdr"><span class="full-phase-dot" style="background:${color}"></span><span style="color:${color}">${escH(g.phase)}</span></div>`;
    }
    g.steps.forEach(({s,i})=>{
      const displayTitle='Step '+(i+1);
      const instr=escH(s.instructions).replace(/\n/g,'<br>');
      const timerRow=s.timerMinutes?`<div class="full-step-timer" style="color:var(--terra)">${escH(s.timerLabel||'')}</div>`:'';
      stepsHTML+=`<div class="full-step">
        <div class="full-step-hdr">
          <div class="full-step-num" style="background:var(--bg-2);color:${color}">${i+1}</div>
          <div class="full-step-title">${escH(displayTitle)}</div>
        </div>
        <div class="full-step-body">${instr}</div>
        ${timerRow}
      </div>`;
    });
  });
  if(!stepsHTML)stepsHTML='<div style="color:var(--text-3);padding:12px 0">No steps found.</div>';

  // Build ingredients HTML
  let ingrHTML='';
  const secs=r.ingredients||[];
  const multiSec=secs.length>1&&secs.some(s=>s.section);
  secs.forEach(sec=>{
    if(multiSec&&sec.section)ingrHTML+=`<div class="full-ingr-sec">${escH(sec.section)}</div>`;
    (sec.items||[]).forEach(item=>{
      ingrHTML+=`<div class="full-ingr-row">${escH(item)}</div>`;
    });
  });

  document.getElementById('app').innerHTML=`
    <div class="shell">
      <div style="position:sticky;top:0;z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);">
        <div style="display:flex;align-items:center;padding:max(14px,env(safe-area-inset-top)) 12px 10px;gap:4px">
          <button class="ibtn" onclick="${backFn}">${I.back}</button>
          <div style="font-size:1rem;font-weight:700;margin-left:4px">${escH(r.name)}</div>
        </div>
      </div>
      <div style="padding:0 18px 32px">
        ${ingrHTML?`<div style="font-size:1rem;font-weight:800;padding:18px 0 8px">Ingredients</div>${ingrHTML}`:''}
        <div style="font-size:1rem;font-weight:800;padding:22px 0 4px">Steps</div>
        ${stepsHTML}
      </div>
      <div style="padding:0 18px 32px">
        <button class="btn btn-terra btn-full btn-lg" onclick="go('guided',{id:${rid}})">Start cooking</button>
      </div>
    </div>${bnavHTML()}`;
}

function fileToDataURL(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
}

// Compress image using createImageBitmap (reliable on desktop Chrome)
async function compressImage(dataURL,maxDim=1536,quality=0.85){
  try{
    // Fetch converts data URL → blob, avoiding canvas taint issues
    const blob=await fetch(dataURL).then(r=>r.blob());
    const bmp=await createImageBitmap(blob);
    let w=bmp.width,h=bmp.height;
    if(w>maxDim||h>maxDim){
      if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
      else{w=Math.round(w*maxDim/h);h=maxDim;}
    }
    const cv=document.createElement('canvas');
    cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(bmp,0,0,w,h);
    if(bmp.close)bmp.close();
    return cv.toDataURL('image/jpeg',quality);
  }catch(e){
    console.warn('compressImage failed:',e.message,'; using original');
    return dataURL;
  }
}

// Compress for API: iteratively shrink until base64 is under ~400KB
async function compressForAPI(dataURL){
  let dim=900,q=0.7;
  for(let attempt=0;attempt<6;attempt++){
    const out=await compressImage(dataURL,dim,q);
    const kb=Math.round(out.length/1024);
    console.log(`compress attempt ${attempt+1}: ${dim}px q=${q} → ${kb}KB`);
    if(out.length<400*1024)return out;
    dim=Math.round(dim*0.65);
    q=Math.max(0.25,q-0.1);
  }
  console.warn('Could not compress below 400KB; sending smallest achieved');
  return compressImage(dataURL,200,0.25);
}

async function processScanFiles(fileList){
  const files=Array.from(fileList);
  if(!files.length)return;
  const dataURLs=await Promise.all(files.map(fileToDataURL));
  const wasEmpty=scanForm.images.length===0;
  scanForm={...scanForm,status:'viewing',images:[...scanForm.images,...dataURLs],currentIdx:wasEmpty?0:scanForm.currentIdx};
  renderAdd();
}

const GROQ_MODELS=['meta-llama/llama-4-scout-17b-16e-instruct'];

async function callGroq(images,prompt){
  const key=GROQ_KEY;
  let lastErr='';
  const body=JSON.stringify({messages:[{role:'user',content:[
    ...images.map(img=>({type:'image_url',image_url:{url:img}})),
    {type:'text',text:prompt}
  ]}],temperature:0.1,max_tokens:2048});
  console.log('→ Groq request size:',Math.round(body.length/1024)+'KB','images:',images.length);

  for(const model of GROQ_MODELS){
    try{
      console.log('→ trying model:',model);
      const payload=JSON.stringify({model,messages:[{role:'user',content:[
        ...images.map(img=>({type:'image_url',image_url:{url:img}})),
        {type:'text',text:prompt}
      ]}],temperature:0.1,max_tokens:2048});

      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),90000); // 90s timeout
      let resp;
      try{
        resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
          body:payload,
          signal:controller.signal
        });
      }finally{clearTimeout(tid);}

      const json=await resp.json();
      if(!resp.ok){
        const msg=json?.error?.message||`HTTP ${resp.status}`;
        console.warn(model,'→',msg);
        lastErr=msg;
        continue;
      }
      console.log('✓ success with',model);
      return json;
    }catch(e){
      lastErr=e.name==='AbortError'?'Request timed out after 90s — check your network connection':e.message;
      console.warn(model,'failed:',lastErr);
    }
  }
  throw new Error(lastErr||'All Groq models failed');
}

function parseGroqJSON(raw){
  const s=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  // Try direct parse first, then find first {...} block
  try{return JSON.parse(s);}catch(_){}
  const m=s.match(/\{[\s\S]*\}/);
  if(m)return JSON.parse(m[0]);
  throw new Error('No JSON found in response');
}

async function scanExtractWithGroq(){
  if(!GROQ_KEY){showToast('Photo scanning is not configured');return;}
  if(!scanForm.images.length){showToast('Add at least one photo first');return;}
  scanForm={...scanForm,status:'loading'};renderAdd();
  try{
    // Quick reachability check — fail fast if network blocks Groq
    try{
      const ping=await fetch('https://api.groq.com/openai/v1/models',{
        headers:{'Authorization':`Bearer ${GROQ_KEY}`},
        signal:AbortSignal.timeout(8000)
      });
      if(!ping.ok&&ping.status===401)throw new Error('Invalid API key');
      console.log('✓ Groq reachable, status:',ping.status);
    }catch(e){
      if(e.name==='TimeoutError'||e.name==='AbortError')
        throw new Error('Cannot reach the Groq API from this network. Photo scanning may be blocked by a firewall or VPN. Try on a different network or use mobile.');
      if(e.message.includes('API key'))throw e;
      console.warn('Ping failed (non-fatal):',e.message);
    }

    // Compress each image, iterating until under 500KB
    const compressed=await Promise.all(scanForm.images.map(d=>compressForAPI(d)));
    const singlePrompt=`Extract the complete recipe from this image. Return ONLY valid JSON, no markdown, no explanation:\n{"name":"Recipe Name","ingredients":["1 cup flour"],"steps":["Step text here."]}`;
    const extraPrompt=`This is an additional page of the same recipe. Extract any extra ingredients and steps not already found. Return ONLY valid JSON:\n{"name":"","ingredients":["any new ingredients"],"steps":["any new steps"]}`;

    // Process images one at a time to avoid payload limits
    let merged={name:'',ingredients:[],steps:[]};
    for(let i=0;i<compressed.length;i++){
      const prompt=i===0?singlePrompt:extraPrompt;
      const data=await callGroq([compressed[i]],prompt);
      const raw=data.choices?.[0]?.message?.content||'';
      const page=parseGroqJSON(raw);
      if(i===0){
        merged.name=page.name||'Scanned Recipe';
        merged.ingredients=[...(page.ingredients||[])];
        merged.steps=[...(page.steps||[])];
      }else{
        // Merge additional pages — deduplicate by text similarity
        (page.ingredients||[]).forEach(ing=>{
          if(!merged.ingredients.some(x=>x.toLowerCase()===ing.toLowerCase()))merged.ingredients.push(ing);
        });
        merged.steps=[...merged.steps,...(page.steps||[])];
      }
    }

    scanForm={
      ...scanForm,
      status:'editing',
      name:merged.name,
      ingrText:merged.ingredients.join('\n'),
      steps:merged.steps.map(s=>({
        instructions:s,timerMinutes:detectTimer(s),
        title:summarizeStepTitle(s),phase:'',timerLabel:'',image:''
      }))
    };
    if(!scanForm.steps.length) scanForm.steps=[{instructions:'',timerMinutes:null,title:'',phase:'',timerLabel:'',image:''}];
    renderAdd();
  }catch(e){
    console.error('Groq scan error:',e);
    scanForm={...scanForm,status:'error',errorMsg:e.message||'Could not read recipe'};renderAdd();
    showToast('Could not read recipe — see details below');
  }
}

}

// Remove website chrome, navigation, ads, and social junk from pasted text
function cleanWebJunk(text){
  const junkLine=/^\s*(?:sign\s*up|subscribe|newsletter|get notified|notify me|follow us|share this|print recipe|save recipe|jump to recipe|jump to card|rate this|leave a comment|leave a review|you may also like|related recipes?|more recipes?|popular recipes?|advertisement|sponsored|disclosure|skip to|back to top|home\s*[>»\/]|pinterest|facebook|twitter|instagram|youtube|tiktok|©|copyright|\d+\s+(?:comments?|reviews?|ratings?|shares?)|calories?:?\s*\d|prep time|cook time|total time|servings?:?\s*\d|course:|cuisine:|keyword:|author:)\s*$/i;
  const urlLine=/https?:\/\/\S+|www\.\S+/;
  const navCrumb=/^[\w\s]+(?:\s*[>»\/|]\s*[\w\s]+){2,}$/; // breadcrumbs like Home > Recipes > Bread
  return text.split('\n').filter(line=>{
    const l=line.trim();
    if(!l)return true; // keep blanks for structure
    if(l.length<3)return false;
    if(junkLine.test(l))return false;
    if(urlLine.test(l))return false;
    if(navCrumb.test(l)&&l.length<80)return false;
    return true;
  }).join('\n');
}

// Does a line look like an actual cooking step or ingredient?
// Used to filter pasted website chrome — intentionally permissive to avoid dropping real steps
function looksLikeCookingStep(s){
  if(s.length<15)return false;
  // Hard reject: clearly website junk
  if(/^(?:sign up|subscribe|newsletter|get notified|follow|share|print|save recipe|jump|advertisement|sponsored|related|more recipes|you may also|back to top|home\s*[>»])/i.test(s.trim()))return false;
  // Accept if it has a quantity or measurement
  if(/\d+\s*(?:g|kg|ml|l|cup|tbsp|tsp|oz|lb|°[CF]|min|hour|hr|clove|bunch|slice|pinch)/i.test(s))return true;
  // Accept if it contains common cooking verbs
  if(/\b(?:add|mix|stir|combine|heat|cook|bake|roast|grill|fry|boil|simmer|sauté|saute|pour|place|put|cover|remove|transfer|fold|whisk|knead|chop|dice|slice|mince|preheat|season|serve|cool|refrigerate|drain|rinse|brush|spread|sprinkle|beat|blend|bring|reduce|toss|coat|marinate|brown|sear|deglaze|fluff|shred|press|roll|shape|rise|proof|rest|allow|let stand|set aside)\b/i.test(s))return true;
  // Accept longer lines that start with a capital — likely a sentence, probably a step
  if(s.length>60&&/^[A-Z]/.test(s.trim()))return true;
  return false;
}

function parseRecipeText(text){
  // Step 1: strip website junk
  text=cleanWebJunk(text);
  // Step 2: normalise markdown — convert ## headings to plain text, strip bold/italic markers
  text=text.replace(/^#{1,6}\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^[-*]\s+/gm,'• ');

  // Detect ingredient & instruction sections
  const ingrRx=/^(?:ingredients?|what you'?ll? need|shopping list)[:\s]*/im;
  const stepsRx=/^(?:instructions?|directions?|method|steps?|how to make|preparation|procedure|for the|to make)[:\s]*/im;
  const notesRx=/^(?:notes?|tips?|nutrition(?:al)?(?: info(?:rmation)?)?|storage|serving suggestions?|make ahead|equipment|video)[:\s]*/im;

  const ingrIdx=text.search(ingrRx);
  const stepsIdx=text.search(stepsRx);
  // Find first notes/end section that comes after steps
  const allNoteMatches=[...text.matchAll(new RegExp(notesRx.source,'gim'))];
  const notesIdx=allNoteMatches.find(m=>m.index>stepsIdx)?.index??-1;

  let ingrText='', stepsText='';

  if(ingrIdx>=0&&stepsIdx>ingrIdx){
    ingrText=text.slice(ingrIdx,stepsIdx);
    stepsText=text.slice(stepsIdx,notesIdx>stepsIdx?notesIdx:undefined);
  }else if(stepsIdx>=0){
    stepsText=text.slice(stepsIdx,notesIdx>stepsIdx?notesIdx:undefined);
    ingrText=text.slice(0,stepsIdx);
  }else{
    // No clear sections — try to split on first cooking verb paragraph
    stepsText=text;
  }

  // Parse ingredients — filter lines that look like ingredient quantities/names
  const ingrLineRx=/^(?:\d[\d\/\s¼½¾⅓⅔⅛]*\s*(?:g|kg|ml|l|cup|tbsp|tsp|oz|lb|large|medium|small|clove|bunch|slice|piece|pinch|dash|handful|can|package|pkg|stick)?\s+.{3,}|[-•*·✓✔▪▸→]\s*.{3,}|[A-Z].{5,})/;
  const ingredients=ingrText.split('\n')
    .map(l=>l.replace(ingrRx,'').replace(/^[-•*·✓✔▪▸→]\s*/,'').trim())
    .filter(l=>{
      if(l.length<3)return false;
      if(/^(?:ingredients?|directions?|instructions?|for the \w+):?$/i.test(l))return false;
      // Reject lines that look like navigation/website junk
      if(/sign up|subscribe|newsletter|©|http/i.test(l))return false;
      // Accept if it has a quantity or looks like an ingredient name
      return true;
    })
    .filter(l=>l.length>2);

  // Parse steps — numbered list first, then paragraphs, then capital sentences
  let rawSteps=[];
  const numberedRx=/\n\s*\d+[.\)]\s+/;
  if(numberedRx.test(stepsText)){
    rawSteps=stepsText.split(numberedRx).map(s=>s.replace(stepsRx,'').trim()).filter(s=>s.length>15);
  }
  if(rawSteps.length<2){
    rawSteps=stepsText.split(/\n{2,}/).map(s=>s.replace(stepsRx,'').trim()).filter(s=>s.length>20);
  }
  if(rawSteps.length<2){
    rawSteps=stepsText.split(/\n/).map(s=>s.trim()).filter(s=>s.length>30&&/^[A-Z0-9]/.test(s));
  }

  // Filter steps: must look like actual cooking instructions
  const validSteps=rawSteps.filter(s=>looksLikeCookingStep(s));
  // If filter removes everything, fall back to all steps (better than nothing)
  const finalSteps=(validSteps.length>=1?validSteps:rawSteps).slice(0,40);

  const parsedSteps=finalSteps.map(chunk=>{
    const instructions=chunk.replace(/^(?:step\s*\d+[:\.\-]?\s*)/i,'').trim();
    const timerMinutes=detectTimer(instructions);
    const title=summarizeStepTitle(instructions);
    return{phase:'',title,instructions,timerMinutes,timerLabel:timerMinutes?`${timerMinutes} min`:''};
  });
  return{ingredients,steps:parsedSteps};
}

function parseDuration(d){
  if(!d)return null;
  const m=d.match(/P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?/);
  if(!m)return null;
  return(parseInt(m[1]||0)*1440)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0)||null;
}
function detectTimer(text){
  // Patterns that introduce a wait/rest/cook duration (most actionable)
  const ACTION_RX=/(?:(?:bake|cook|roast|simmer|boil|fry|rest|let\s+(?:it\s+)?(?:rest|sit|rise|cool|stand)|proof|ferment|chill|refrigerate|freeze|soak|marinate|steep|wait|leave|set\s+aside|allow|let\s+stand)\s+(?:for\s+)?|for\s+)(\d+(?:\.\d+)?)\s*(?:to|-|–|—)\s*(\d+(?:\.\d+)?)\s*(hour|hr|minute|min)s?/gi;
  const ACTION_SINGLE=/(?:(?:bake|cook|roast|simmer|boil|fry|rest|let\s+(?:it\s+)?(?:rest|sit|rise|cool|stand)|proof|ferment|chill|refrigerate|freeze|soak|marinate|steep|wait|leave|set\s+aside|allow|let\s+stand)\s+(?:for\s+)?|for\s+)(\d+(?:\.\d+)?)\s*(hour|hr|minute|min)s?/gi;
  // Fallback: any range or standalone time
  const RANGE_RX=/(\d+(?:\.\d+)?)\s*(?:to|-|–|—)\s*(\d+(?:\.\d+)?)\s*(hour|hr|minute|min)s?/gi;
  const ANY_RX=/(\d+(?:\.\d+)?)\s*(hour|hr|minute|min)s?/gi;

  function toMins(a,b,u){
    const h=u.toLowerCase().startsWith('h');
    const mid=b!=null?(+a+ +b)/2:+a;
    return mid*(h?60:1);
  }

  let candidates=[];
  let m;

  // Priority 1: action-verb ranges ("bake for 20–25 minutes")
  while((m=ACTION_RX.exec(text))!==null){
    const[,a,b,u]=m;candidates.push({mins:toMins(a,b,u),pri:3,pos:m.index});}
  // Priority 2: action-verb singles ("rest for 2 hours")
  while((m=ACTION_SINGLE.exec(text))!==null){
    const[,a,u]=m;candidates.push({mins:toMins(a,null,u),pri:2,pos:m.index});}
  // Priority 3: plain ranges ("20–25 minutes")
  while((m=RANGE_RX.exec(text))!==null){
    const[,a,b,u]=m;candidates.push({mins:toMins(a,b,u),pri:1,pos:m.index});}
  // Priority 4: any time mention
  while((m=ANY_RX.exec(text))!==null){
    const[,a,u]=m;candidates.push({mins:toMins(a,null,u),pri:0,pos:m.index});}

  if(!candidates.length)return null;

  // Filter out clearly unreasonable values (>3 days or 0)
  candidates=candidates.filter(c=>c.mins>0&&c.mins<=4320);

  if(!candidates.length)return null;

  // Among the highest-priority group, pick the LAST one
  // (handles "after 8 hours, bake for 45 minutes" → picks 45)
  const maxPri=Math.max(...candidates.map(c=>c.pri));
  const top=candidates.filter(c=>c.pri===maxPri);
  const pick=top.reduce((a,b)=>b.pos>a.pos?b:a);
  return Math.round(pick.mins)||null;
}

function findRecipeNode(json){
  if(!json)return null;
  if(typeof json!=='object')return null;
  const type=json['@type'];
  if(type==='Recipe'||(Array.isArray(type)&&type.includes('Recipe')))return json;
  if(json['@graph']){
    if(Array.isArray(json['@graph'])){for(const n of json['@graph']){const f=findRecipeNode(n);if(f)return f;}}
    else{const f=findRecipeNode(json['@graph']);if(f)return f;}
  }
  if(Array.isArray(json)){for(const n of json){const f=findRecipeNode(n);if(f)return f;}}
  return null;
}

function parseJSONLD(json){
  // Extract image
  let image='';
  if(json.image){
    if(typeof json.image==='string')image=json.image;
    else if(Array.isArray(json.image)){const fi=json.image[0];image=typeof fi==='string'?fi:fi?.url||fi?.['@id']||'';}
    else if(json.image.url)image=json.image.url;
    else if(json.image['@id'])image=json.image['@id'];
  }
  // Yield
  const yld=Array.isArray(json.recipeYield)?json.recipeYield[0]:json.recipeYield||'';
  // Description
  const desc=(json.description||'').replace(/<[^>]+>/g,'').trim();
  // Cookware
  const cookware=[];
  if(Array.isArray(json.tool))json.tool.forEach(t=>{if(typeof t==='string')cookware.push(t);else if(t.name)cookware.push(t.name);});
  // Ingredients — handle strings, objects with name/text, and single values
  const rawIngrRaw=Array.isArray(json.recipeIngredient)?json.recipeIngredient:
                   (json.recipeIngredient?[json.recipeIngredient]:[]);
  const rawIngr=rawIngrRaw.map(i=>{
    if(typeof i==='string')return i.replace(/<[^>]+>/g,'').trim();
    return(i.name||i.text||i['@value']||'').replace(/<[^>]+>/g,'').trim();
  }).filter(s=>s.length>1);
  const ingredients=rawIngr.length?[{section:'Ingredients',items:rawIngr}]:[];
  // Steps
  // Helper: strip HTML tags from instruction text
  function stripTags(s){return(s||'').replace(/<[^>]+>/g,' ').replace(/\s{2,}/g,' ').trim();}
  // Helper: extract a single step item (HowToStep or plain)
  function extractStep(item){
    if(!item)return null;
    if(typeof item==='string'){const t=stripTags(item);return t.length>5?t:null;}
    const t=stripTags(item.text||item.name||item['@value']||'');
    return t.length>5?{text:t,name:stripTags(item.name||''),img:typeof item.image==='string'?item.image:(item.image?.url||''),time:parseDuration(item.timeRequired)||null}:null;
  }
  // Try standard recipeInstructions, then fall back to non-standard fields
  const rawInstr=json.recipeInstructions||json.instructions||json.steps||[];
  const flatInstr=Array.isArray(rawInstr)?rawInstr:[rawInstr];
  const steps=[];
  flatInstr.forEach(item=>{
    // HowToSection — iterate itemListElement, use section name as phase
    if(item&&(item['@type']==='HowToSection'||item['@type']==='ItemList')&&Array.isArray(item.itemListElement)){
      const sectionPhase=stripTags(item.name||'').trim();
      item.itemListElement.forEach(sub=>{
        const s=extractStep(sub);
        if(s){const t=typeof s==='string'?s:s.text;const nm=typeof s==='string'?'':s.name;const img=typeof s==='string'?'':s.img;const tm=(typeof s==='object'&&s.time)||detectTimer(t);steps.push({phase:sectionPhase,title:nm&&nm.length<80&&nm!==t?nm:summarizeStepTitle(t),instructions:t,image:img,timerMinutes:tm,timerLabel:tm?`${tm} min`:''});}
      });
    } else {
      // HowToStep, plain string, or object with text/name — no section
      const s=extractStep(item);
      if(s){const t=typeof s==='string'?s:s.text;const nm=typeof s==='string'?'':s.name;const img=typeof s==='string'?'':s.img;const tm=(typeof s==='object'&&s.time)||detectTimer(t);steps.push({phase:'',title:nm&&nm.length<80&&nm!==t?nm:summarizeStepTitle(t),instructions:t,image:img,timerMinutes:tm,timerLabel:tm?`${tm} min`:''});}
    }
  });
  // Fix timer labels
  steps.forEach(s=>{if(s.timerMinutes&&!s.timerLabel)s.timerLabel=`${s.timerMinutes} min`;});
  return{name:json.name||'',description:desc,image,yield:String(yld),difficulty:'Intermediate',cookware,ingredients,steps};
}

// Multiple proxy strategies
async function tryFetch(url){
  const enc=encodeURIComponent(url);
  const proxies=[
    // allorigins — returns JSON with {contents}
    async()=>{
      const r=await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`allorigins ${r.status}`);
      const d=await r.json();
      if(!d.contents||d.contents.length<300)throw new Error('Empty allorigins response');
      return d.contents;
    },
    // codetabs — returns raw HTML
    async()=>{
      const r=await fetch(`https://api.codetabs.com/v1/proxy/?quest=${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`codetabs ${r.status}`);
      const t=await r.text();
      if(t.length<300||t.includes('"Error"'))throw new Error('Empty codetabs response');
      return t;
    },
    // corsproxy.io — returns raw HTML
    async()=>{
      const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`corsproxy ${r.status}`);
      const t=await r.text();
      if(t.length<300)throw new Error('Empty corsproxy response');
      return t;
    },
    // thingproxy — returns raw HTML
    async()=>{
      const r=await fetch(`https://thingproxy.freeboard.io/fetch/${url}`,{signal:AbortSignal.timeout(12000)});
      if(!r.ok)throw new Error(`thingproxy ${r.status}`);
      const t=await r.text();
      if(t.length<300)throw new Error('Empty thingproxy response');
      return t;
    },
  ];
  let lastErr='';
  for(const proxy of proxies){try{return await proxy();}catch(e){lastErr=e.message;}}
  throw new Error(lastErr);
}

// Jina reader — returns clean markdown, bypasses Cloudflare & JS-rendered sites
async function tryJina(url){
  const r=await fetch(`https://r.jina.ai/${url}`,{
    headers:{'Accept':'text/markdown','X-Return-Format':'markdown'},
    signal:AbortSignal.timeout(20000)
  });
  if(!r.ok)throw new Error(`Jina ${r.status}`);
  const t=await r.text();
  if(t.length<200)throw new Error('Jina empty response');
  return t;
}

// Parse Jina markdown into a recipe object
function parseMarkdownRecipe(md,url){
  // Extract title from first H1 or H2
  const titleM=md.match(/^#{1,2}\s+(.+)/m);
  const name=(titleM?titleM[1]:'').replace(/\*+/g,'').trim();
  // Extract OG image from markdown (Jina sometimes includes ![...](url))
  const imgM=md.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);
  const image=imgM?imgM[1]:'';
  // Run through the text parser
  const parsed=parseRecipeText(md);
  return{
    name,description:'',image,yield:'',difficulty:'Intermediate',cookware:[],
    ingredients:parsed.ingredients.length?[{section:'Ingredients',items:parsed.ingredients}]:[],
    steps:parsed.steps
  };
}

async function fetchFromURL(){
  const urlEl=document.getElementById('f-url');
  const url=(urlEl?.value||state.addForm.url||'').trim();
  if(!url){showToast('Please enter a URL');return;}
  state.addForm.url=url;
  state.addForm.urlStatus='loading';state.addForm.urlError='';state.addForm.urlParsed=null;
  renderAdd();
  try{
    // Try HTML proxies first (gives JSON-LD access), then fall back to Jina markdown
    let html=null,useJina=false;
    try{html=await tryFetch(url);}catch(e){
      try{html=await tryJina(url);useJina=true;}catch(e2){
        throw new Error('Could not fetch the page. The site may block automated access. Try copying the recipe text and using Paste Text instead.');
      }
    }
    // Jina path: parse markdown directly, no DOM/JSON-LD
    if(useJina){
      const parsed=parseMarkdownRecipe(html,url);
      state.addForm.urlParsed=parsed;
      state.addForm.urlStatus=parsed.steps.length?'success':'partial';
      state.addForm.urlError=parsed.steps.length?'':'Recipe found but steps could not be extracted. Try Paste Text.';
      renderAdd();return;
    }
    const doc=new DOMParser().parseFromString(html,'text/html');
    // Try all JSON-LD blocks
    let node=null;
    for(const script of doc.querySelectorAll('script[type="application/ld+json"]')){
      try{node=findRecipeNode(JSON.parse(script.textContent));if(node)break;}catch(e){}
    }
    // Remove chrome elements from doc for clean text extraction
    function cleanDoc(d){
      ['script','style','nav','footer','header','aside','[role="navigation"]','[role="banner"]',
       '.nav','.menu','.sidebar','.footer','.header','.ad','.advertisement','.popup','.modal',
       '.newsletter','.subscribe','.social','noscript','iframe'].forEach(sel=>{
        try{d.body?.querySelectorAll(sel).forEach(el=>el.remove());}catch(e){}
      });
    }
    // Extract clean body text (textContent, not innerText, works in DOMParser context)
    function docBodyText(d){
      return(d.body?.textContent||'').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
    }
    // Find the nearest preceding heading/label for an element
    function precedingHeader(el){
      // Walk previous siblings and parent's previous siblings
      let cur=el.previousElementSibling;
      let depth=0;
      while(cur&&depth<5){
        const tag=cur.tagName||'';
        if(/^H[1-6]$/i.test(tag)||tag==='STRONG'||tag==='B'){
          const t=(cur.textContent||'').replace(/\s+/g,' ').trim();
          if(t.length>1&&t.length<80)return t;
        }
        // Also check if the sibling itself contains a heading as first child
        const inner=cur.querySelector('h1,h2,h3,h4,h5,h6,strong');
        if(inner){const t=(inner.textContent||'').trim();if(t.length>1&&t.length<80)return t;}
        cur=cur.previousElementSibling;
        depth++;
      }
      // Try parent element's preceding siblings
      if(el.parentElement){
        let par=el.parentElement.previousElementSibling;
        let pd=0;
        while(par&&pd<3){
          const tag=par.tagName||'';
          if(/^H[1-6]$/i.test(tag)||tag==='STRONG'||tag==='B'){
            const t=(par.textContent||'').replace(/\s+/g,' ').trim();
            if(t.length>1&&t.length<80)return t;
          }
          const inner=par.querySelector('h1,h2,h3,h4,h5,h6,strong');
          if(inner){const t=(inner.textContent||'').trim();if(t.length>1&&t.length<80)return t;}
          par=par.previousElementSibling;pd++;
        }
      }
      return'';
    }
    // Try to extract steps from ALL <ol> lists in the DOM, preserving section headers as phases
    function domExtractSteps(d){
      const steps=[];
      const ols=[...d.querySelectorAll('ol')].filter(ol=>ol.querySelectorAll('li').length>=1);
      if(!ols.length)return steps;
      // If only one <ol>, just use it with Prep phase
      ols.forEach(ol=>{
        const header=precedingHeader(ol);
        const phase=header?header.trim():'';
        ol.querySelectorAll('li').forEach(li=>{
          const txt=(li.textContent||'').replace(/\s+/g,' ').trim();
          if(txt.length>10){
            const tm=detectTimer(txt);
            steps.push({phase,title:summarizeStepTitle(txt),instructions:txt,image:'',timerMinutes:tm,timerLabel:tm?`${tm} min`:''});
          }
        });
      });
      return steps;
    }
    // Try to extract ingredients from <ul> lists in the DOM, preserving sections
    function domExtractIngredients(d){
      const ingrWordRx=/\b(?:cup|tbsp|tsp|oz|lb|gram|g\b|kg|ml|litre|liter|pinch|clove|bunch|slice|piece|large|medium|small|fresh|dried|chopped|minced|diced|divided|optional|to taste|\d+)\b/i;
      // Score a <ul> for ingredient-likeness
      function ingrScore(ul){
        const lis=[...ul.querySelectorAll('li')];
        if(lis.length<2)return 0;
        const avgLen=lis.reduce((s,li)=>s+(li.textContent||'').trim().length,0)/lis.length;
        if(avgLen>150)return 0; // too long to be ingredients
        const matches=lis.filter(li=>ingrWordRx.test(li.textContent||'')).length;
        return matches;
      }
      const allUls=[...d.querySelectorAll('ul')].filter(ul=>ingrScore(ul)>0);
      if(!allUls.length)return[];
      // Group <ul> lists by their preceding section header
      const sections=[];
      allUls.forEach(ul=>{
        const header=precedingHeader(ul);
        // Skip if header looks like navigation / unrelated
        if(header&&/nav|menu|social|share|follow|related|more recipes/i.test(header))return;
        const items=[...ul.querySelectorAll('li')]
          .map(li=>(li.textContent||'').replace(/\s+/g,' ').trim())
          .filter(t=>t.length>2&&t.length<200);
        if(!items.length)return;
        // Merge into existing section with same header if adjacent
        const sec=header||'Ingredients';
        const last=sections[sections.length-1];
        if(last&&last.section===sec){last.items.push(...items);}
        else{sections.push({section:sec,items});}
      });
      return sections;
    }
    // Permissive text → steps (no cooking-verb filter; used after we've already stripped chrome)
    function textToSteps(txt){
      let chunks=[];
      if(/\n\s*\d+[.\)]\s+/.test(txt))chunks=txt.split(/\n\s*\d+[.\)]\s+/).filter(s=>s.length>15);
      if(chunks.length<2)chunks=txt.split(/\n{2,}/).filter(s=>s.length>20);
      if(chunks.length<2)chunks=txt.split(/\n/).filter(s=>s.length>40&&/^[A-Z0-9]/.test(s));
      return chunks.slice(0,40).map(chunk=>{
        const instructions=chunk.replace(/^(?:step\s*\d+[:\.\-]?\s*)/i,'').trim();
        const tm=detectTimer(instructions);
        return{phase:'',title:summarizeStepTitle(instructions),instructions,image:'',timerMinutes:tm,timerLabel:tm?`${tm} min`:''};
      });
    }

    if(node){
      const parsed=parseJSONLD(node);
      // Fallback if steps missing: try DOM <ol> extraction, then text parsing
      if(!parsed.steps.length){
        let fallbackSteps=domExtractSteps(doc);
        if(!fallbackSteps.length){
          cleanDoc(doc);
          const bodyText=docBodyText(doc);
          const fb=parseRecipeText(bodyText);
          fallbackSteps=fb.steps;
          if(!parsed.ingredients.length&&fb.ingredients.length)
            parsed.ingredients=[{section:'Ingredients',items:fb.ingredients}];
        }
        parsed.steps=fallbackSteps;
      }
      // Fallback if ingredients missing: try DOM <ul> extraction, then text parsing
      if(!parsed.ingredients.length){
        const domIngr=domExtractIngredients(doc);
        if(domIngr.length){
          parsed.ingredients=domIngr;
        }else{
          cleanDoc(doc);
          const bodyText=docBodyText(doc);
          const fb=parseRecipeText(bodyText);
          if(fb.ingredients.length)parsed.ingredients=[{section:'Ingredients',items:fb.ingredients}];
        }
      }
      state.addForm.urlStatus=parsed.steps.length?'success':'partial';
      state.addForm.urlError=parsed.steps.length?'':'Recipe info found but steps could not be extracted. Try Paste Text.';
      state.addForm.urlParsed=parsed;
    }else{
      // No JSON-LD — try DOM extraction first, then text parsing
      const domSteps=domExtractSteps(doc);
      const domIngr=domExtractIngredients(doc);
      cleanDoc(doc);
      const bodyText=docBodyText(doc);
      const pageTitle=doc.querySelector('title')?.textContent?.replace(/\s*[-|–].*$/,'').trim()||'';
      const metaDesc=doc.querySelector('meta[name="description"]')?.content||doc.querySelector('meta[property="og:description"]')?.content||'';
      const ogImage=doc.querySelector('meta[property="og:image"]')?.content||'';
      if(bodyText.length<200)throw new Error('The page content could not be read. The site may require JavaScript or block automated access. Try copying the recipe text and using Paste Text instead.');
      const fb=parseRecipeText(bodyText);
      const finalSteps=domSteps.length>=fb.steps.length?domSteps:fb.steps;
      const finalIngr=domIngr.length?domIngr:(fb.ingredients.length?[{section:'Ingredients',items:fb.ingredients}]:[]);
      state.addForm.urlParsed={name:pageTitle,description:metaDesc,image:ogImage,yield:'',difficulty:'Intermediate',cookware:[],ingredients:finalIngr,steps:finalSteps};
      state.addForm.urlStatus=finalSteps.length?'partial':'error';
      state.addForm.urlError=finalSteps.length?'No structured recipe found — extracted from page text. Please review the steps carefully.':'No recipe content detected. The site may block automated access. Try copying the text and using Paste Text.';
    }
  }catch(err){
    state.addForm.urlStatus='error';
    state.addForm.urlError=err.message||'Something went wrong.';
  }
  renderAdd();
}

function saveURLRecipe(){
  const name=document.getElementById('url-name')?.value.trim();
  if(!name){showToast('Please enter a recipe name');return;}
  const p=state.addForm.urlParsed;
  recipes.push({id:nextId++,name,description:p.description||'',image:p.image||'',yield:p.yield||'',difficulty:p.difficulty||'Intermediate',cookware:p.cookware||[],ingredients:p.ingredients||[],steps:(p.steps||[]).map(s=>({...s}))});
  saveRecipes();resetForm();go('list');showToast('Recipe saved!');
}

function deleteRecipe(id){
  if(!confirm('Delete this recipe?'))return;
  recipes=recipes.filter(r=>r.id!==id);saveRecipes();go('list');
}

// ═══════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════
function render(){
  if(state.view==='guided'){renderGuided();return;}
  if(state.view==='complete'){renderComplete();return;}
  if(state.view==='full'){renderFull();return;}
  if(state.view==='detail'){renderDetail();return;}
  if(state.view==='add'){renderAdd();return;}
  if(state.tab==='shoplist'){renderShopList();return;}
  if(state.tab==='timers'){renderTimers();return;}
  renderList();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
restoreTimer();
askNotifPerm();
render();
</script>
