      ?`<div style="font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin:10px 0 4px">${escH(sec.section)}</div>`:'';
    return hdr+(sec.items||[]).map(item=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:.9rem">${escH(item)}</div>`).join('');
  }).join('');
  const stepsHTML=(p.steps||[]).map((s,i)=>`
    <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="background:var(--terra);color:#fff;border-radius:50%;width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;margin-top:2px">${i+1}</span>
      <div>
        <div style="font-weight:600;font-size:.88rem;margin-bottom:3px">Step ${i+1}</div>
        ${s.instructions?`<div style="font-size:.88rem;line-height:1.65;color:var(--text-1)">${escH(s.instructions)}</div>`:''}
        ${s.timerMinutes?`<span style="display:inline-block;margin-top:4px;background:var(--terra-bg);color:var(--terra);font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px">${s.timerMinutes} min</span>`:''}
      </div>
    </div>`).join('');
  const courseOpts=['','Breakfast','Brunch','Lunch','Dinner','Dessert','Snack','Appetizer','Side Dish','Soup','Salad','Main Course'];
  const mkField=(id,label,val,ph='')=>`<div class="field"><label>${label}</label><input class="input" id="${id}" value="${escH(val)}" placeholder="${ph||label}"/></div>`;
  const mkSelect=(id,label,val)=>`<div class="field"><label>${label}</label><select class="input" id="${id}">${courseOpts.map(o=>`<option value="${o}"${o===val?' selected':''}>${o||'Select…'}</option>`).join('')}</select></div>`;
  // Compute total calories so calories/serving auto-updates when servings change
  const _calNum=parseFloat(p.calories)||0;
  const _srvNum=parseFloat((p.yield||'').match(/[\d.]+/)?.[0]||'0')||0;
  const _totalCal=(_calNum&&_srvNum)?Math.round(_calNum*_srvNum):0;
  const servCalRow=`<div class="two-col">
    <div class="field"><label>Servings</label><input class="input" id="pv-servings" value="${escH(p.yield)}" placeholder="e.g. 4 servings" oninput="updatePreviewCal(this.value,${_totalCal})"/></div>
    <div class="field"><label>Calories / Serving${p._caloriesEstimated?(()=>{
      const src=p._caloriesSource||'ai';
      const label=src==='usda'?'~ USDA data':src==='mixed'?'~ USDA + estimated':'~ AI estimate';
      const color=src==='usda'?'#2A9D5C':src==='mixed'?'#B45309':'var(--terra)';
      return` <span style="font-weight:500;text-transform:none;letter-spacing:0;color:${color};font-size:.7rem">${label}</span>`;
    })():''}</label><input class="input" id="pv-calories" value="${escH(p.calories)}" placeholder="e.g. 320"/>${p._caloriesEstimated?(()=>{
      const src=p._caloriesSource||'ai';
      const msg=src==='usda'?'Calculated from USDA nutritional database. Edit if needed.'
               :src==='mixed'?'Calculated using USDA data for most ingredients, AI estimate for the rest. Edit if needed.'
               :'Not found in recipe — AI estimate only. Edit if you know the exact value.';
      return`<div style="font-size:.72rem;color:var(--text-3);margin-top:4px;line-height:1.5">${msg}</div>`;
    })():''}</div>
  </div>`;
  document.getElementById('app').innerHTML=`
    <div class="shell">
      <div class="topbar"><div class="topbar-row">
        <button class="ibtn" onclick="closePreview()">${I.back}</button>
        <div class="topbar-title" style="font-size:1.05rem">Review & Save</div>
        <div style="width:40px"></div>
      </div></div>
      <div class="add-page" style="padding-bottom:110px">
        ${p.image?`<img src="${escH(p.image)}" style="width:100%;height:200px;object-fit:cover;border-radius:14px;margin-bottom:16px" onerror="this.remove()">`:''}
        <div class="field">
          <label>Recipe Name</label>
          <input class="input" id="preview-name" value="${escH(p.name)}" placeholder="Recipe name"/>
        </div>
        <div class="slabel" style="margin:16px 0 8px">Timing</div>
        <div class="two-col">
          ${mkField('pv-prep','Prep Time',p.prepTime,'15 min')}
          ${mkField('pv-cook','Cook Time',p.cookTime,'30 min')}
        </div>
        ${mkField('pv-total','Total Time',p.totalTime,'45 min')}
        <div class="slabel" style="margin:16px 0 8px">Details</div>
        <div class="two-col">
          ${mkSelect('pv-course','Course',p.course)}
          ${mkField('pv-cuisine','Cuisine',p.cuisine,'e.g. Italian')}
        </div>
        ${servCalRow}
        ${allIngr.length?`
        <details class="accordion" style="margin-top:16px">
          <summary>Ingredients<span class="acc-right">${allIngr.length} item${allIngr.length!==1?'s':''}${sectionCount>1?` · ${sectionCount} sections`:''}<span class="acc-chevron">▼</span></span></summary>
          <div class="accordion-body">${ingrHTML}</div>
        </details>`:''}
        ${(p.steps||[]).length?`
        <details class="accordion">
          <summary>Steps<span class="acc-right">${(p.steps||[]).length} step${(p.steps||[]).length!==1?'s':''}<span class="acc-chevron">▼</span></span></summary>
          <div class="accordion-body">${stepsHTML}</div>
        </details>`:''}
        <div class="field" style="margin-top:4px">
          <label>Chef's Notes</label>
          <textarea class="input ta" id="pv-notes" rows="3" placeholder="Recipe tips, storage, substitutions…">${escH(p.notes||'')}</textarea>
        </div>
        <button class="btn btn-terra btn-full btn-lg" style="margin-top:20px" onclick="saveFromPreview()">Save Recipe</button>
        <button class="btn btn-ghost btn-full" style="margin-top:10px" onclick="closePreview()">← Back to Edit</button>
      </div>
    </div>${bnavHTML()}`;
}

  if(state.view==='complete'){renderComplete();return;}
  if(state.view==='full'){renderFull();return;}
  if(state.view==='detail'){renderDetail();return;}

  if(state.view==='preview'){renderPreview();return;}
  if(state.view==='settings'){renderSettings();return;}
  if(state.tab==='shoplist'){renderShopList();return;}
  if(state.tab==='timers'){renderTimers();return;}
  renderList();
}
